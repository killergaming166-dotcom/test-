<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .main-card {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        .field-container {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .field-label {
            position: absolute;
            top: -9px;
            left: 12px;
            background: white;
            padding: 0 8px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10;
        }
        .field-content {
            width: 100%;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-size: 1.2rem;
            font-weight: 700;
            min-height: 62px;
            display: flex;
            align-items: center;
            background: #fafafa;
            color: #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .is-active {
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
            color: #15803d !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.1);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
        }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); }
        .status-dot.offline { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); }
        
        .pulse-text { animation: pulse-op 2s infinite; }
        @keyframes pulse-op { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-600 uppercase">Điểm danh</h1>
            <div class="flex items-center justify-center gap-2 mt-2">
                <div id="status-dot" class="status-dot"></div>
                <p id="connection-text" class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase">Đang kiểm tra Cloud...</p>
            </div>
        </div>

        <div class="field-container">
            <span class="field-label text-blue-500">Họ và Tên</span>
            <div id="disp-name" class="field-content">---</div>
        </div>

        <div class="field-container">
            <span class="field-label text-emerald-500">Mã số sinh viên</span>
            <div id="disp-mssv" class="field-content">---</div>
        </div>

        <div class="field-container">
            <span class="field-label text-orange-500">Mã Chip RFID</span>
            <div id="disp-rfid" class="field-content font-mono text-sm italic text-slate-400">---</div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-50 flex flex-col items-center">
            <div id="action-icon" class="mb-2 opacity-20 transition-all duration-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <p id="status-msg" class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-300 pulse-text">Sẵn sàng quẹt thẻ</p>
        </div>
    </div>

    <script>
        const TOKEN = "53f7b5a4-c19e-4760-9940-ff280ac07374";
        const API = `https://vn.e-ra.io/v1/devices/data?token=${TOKEN}`;

        async function syncData() {
            try {
                // Thêm header để tránh cache tối đa
                const response = await fetch(`${API}&_t=${Date.now()}`, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) throw new Error("Offline");
                
                const results = await response.json();
                
                const uid = results.find(i => i.pin === 0)?.value || "---";
                const name = results.find(i => i.pin === 1)?.value || "---";
                const mssv = results.find(i => i.pin === 2)?.value || "---";

                document.getElementById('disp-name').innerText = name;
                document.getElementById('disp-mssv').innerText = mssv;
                document.getElementById('disp-rfid').innerText = uid;

                document.getElementById('status-dot').className = "status-dot online";
                document.getElementById('connection-text').innerText = "Cloud Việt Nam Online";
                document.getElementById('connection-text').style.color = "#10b981";

                // Kiểm tra xem có phải dữ liệu thật không
                const isWaiting = (name === "---" || name === "Sẵn sàng" || name === "Waiting..." || name === "" || uid === "---");

                const nameBox = document.getElementById('disp-name');
                const mssvBox = document.getElementById('disp-mssv');
                const rfidBox = document.getElementById('disp-rfid');
                const msg = document.getElementById('status-msg');
                const icon = document.getElementById('action-icon');

                if (!isWaiting) {
                    nameBox.classList.add('is-active');
                    mssvBox.classList.add('is-active');
                    rfidBox.classList.add('is-active');
                    msg.innerText = "Điểm danh thành công";
                    msg.className = "text-[11px] font-black uppercase tracking-[0.25em] text-emerald-600";
                    icon.classList.remove('opacity-20');
                    icon.style.color = "#10b981";
                } else {
                    nameBox.classList.remove('is-active');
                    mssvBox.classList.remove('is-active');
                    rfidBox.classList.remove('is-active');
                    msg.innerText = "Sẵn sàng quẹt thẻ";
                    msg.className = "text-[11px] font-black uppercase tracking-[0.25em] text-slate-300 pulse-text";
                    icon.classList.add('opacity-20');
                    icon.style.color = "currentColor";
                }
            } catch (err) {
                document.getElementById('status-dot').className = "status-dot offline";
                document.getElementById('connection-text').innerText = "Mất kết nối Cloud";
                document.getElementById('connection-text').style.color = "#ef4444";
            }
        }

        setInterval(syncData, 1500);
        syncData();
    </script>
</body>
</html>
