<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Check-in Voice Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); padding: 2.5rem; width: 100%; max-width: 480px; border: 1px solid rgba(255,255,255,1); position: relative; }
        
        #pinModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
        
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .timer-bar { position: absolute; bottom: 0; left: 0; height: 8px; background: rgba(0,0,0,0.05); width: 100%; overflow: hidden; border-radius: 0 0 40px 40px; display: none; }
        .timer-progress { height: 100%; background: currentColor; width: 100%; transform-origin: left; transition: transform 0.1s linear; }
        @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        
        .status-active { color: #10b981; }
        .status-error { color: #ef4444; }
    </style>
</head>
<body class="p-4">

    <!-- Modal PIN -->
    <div id="pinModal">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-xs text-center">
            <h3 class="text-xl font-black mb-6 text-slate-800 tracking-tight">XÁC THỰC QUYỀN</h3>
            <input type="password" id="inputPin" class="w-full text-center text-4xl font-black border-b-4 border-slate-100 focus:border-indigo-500 outline-none mb-8 pb-2 text-indigo-600" placeholder="••••" maxlength="4">
            <div class="flex gap-4">
                <button onclick="closePinModal()" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase tracking-widest">Hủy</button>
                <button onclick="verifyAndExport()" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-colors">Xuất File</button>
            </div>
        </div>
    </div>

    <div class="card space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter">HỆ THỐNG RFID</h1>
                <div class="flex items-center mt-1">
                    <span id="connectionDot" class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse mr-2"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Máy chủ kết nối</span>
                </div>
            </div>
            <div class="bg-slate-50 px-4 py-3 rounded-2xl text-center border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Tổng SV</p>
                <p id="totalCount" class="text-2xl font-black text-slate-800">0</p>
            </div>
        </div>

        <!-- Scan Display -->
        <div id="scanArea" class="relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50 transition-all duration-300 overflow-hidden">
            
            <div id="statusIcon" class="mb-4 text-slate-200">
                <svg class="w-28 h-28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>
            </div>
            
            <div class="text-center px-10 z-10">
                <h2 id="displayName" class="text-3xl font-black text-slate-300 uppercase leading-tight tracking-tight mb-2">Vui lòng chạm thẻ</h2>
                <p id="displayMSSV" class="text-xl font-bold text-slate-500 h-8 bg-white/50 inline-block px-4 rounded-xl"></p>
            </div>

            <div id="displayUID" class="absolute bottom-10 px-5 py-2 bg-white border border-slate-100 rounded-full text-[10px] font-mono font-bold text-slate-300 tracking-wider">
                CARD ID: ---
            </div>

            <!-- Timer Visual -->
            <div id="timerContainer" class="timer-bar">
                <div id="timerProgress" class="timer-progress"></div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-4">
            <button onclick="openPinModal()" class="flex-[2] py-5 bg-indigo-600 text-white rounded-3xl font-black text-[11px] tracking-widest uppercase shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                TẢI DỮ LIỆU (.CSV)
            </button>
            <button onclick="clearHistory()" class="flex-1 py-5 bg-white border border-slate-200 text-slate-400 rounded-3xl font-black text-[11px] tracking-widest uppercase hover:text-red-500 hover:border-red-100 transition-all">
                XÓA
            </button>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const MASTER_PIN = "0909";
        const DISPLAY_TIME = 5000;
        
        const eraWidget = new EraWidget();
        let logs = [];
        let configUID, configName, configMSSV;
        let lastUID = null;
        let timerRef = null;

        eraWidget.init({
            needRealtimeConfigs: true,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                const uid = v[configUID?.id]?.value;
                const name = v[configName?.id]?.value || "Người lạ";
                const mssv = v[configMSSV?.id]?.value || "---";

                const isAvailable = (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "" && uid !== "Sẵn sàng");

                if (isAvailable && uid !== lastUID) {
                    handleNewScan(uid, name, mssv);
                }
            }
        });

        function handleNewScan(uid, name, mssv) {
            if (timerRef) clearTimeout(timerRef);
            lastUID = uid;

            const isStranger = (name.toUpperCase().includes("NGUOI LA") || mssv === "---" || name === "Người lạ");
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour: 12: false });
            
            logs.unshift({ time: timeStr, name, mssv, uid, type: isStranger ? 'THẺ LẠ' : 'SINH VIÊN' });
            document.getElementById('totalCount').innerText = logs.length;

            updateDisplay(uid, name, mssv, isStranger);
            triggerVoice(name, mssv, isStranger);

            timerRef = setTimeout(() => {
                resetToDefault();
                lastUID = null;
            }, DISPLAY_TIME);
        }

        function updateDisplay(uid, name, mssv, error) {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');
            const tc = document.getElementById('timerContainer');
            const tp = document.getElementById('timerProgress');

            dn.innerText = name.toUpperCase();
            dn.className = "text-3xl font-black uppercase leading-tight tracking-tight mb-2 " + (error ? "text-red-600" : "text-emerald-700");
            dm.innerText = mssv !== "---" ? `MSSV: ${mssv}` : "CHƯA ĐĂNG KÝ";
            du.innerText = `CARD ID: ${uid}`;
            
            tc.style.display = 'block';
            tp.style.animation = 'none';
            tp.offsetHeight;
            tp.style.animation = `shrink ${DISPLAY_TIME}ms linear forwards`;

            if (error) {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-red-500 rounded-[48px] bg-red-50 shake transition-all duration-300";
                si.innerHTML = `<svg class="w-28 h-28 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                tc.style.color = "#ef4444";
            } else {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-emerald-500 rounded-[48px] bg-emerald-50 transition-all duration-300";
                si.innerHTML = `<svg class="w-28 h-28 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                tc.style.color = "#10b981";
            }
        }

        function resetToDefault() {
            document.getElementById('displayName').innerText = "Vui lòng chạm thẻ";
            document.getElementById('displayName').className = "text-3xl font-black text-slate-300 uppercase leading-tight tracking-tight mb-2";
            document.getElementById('displayMSSV').innerText = "";
            document.getElementById('displayUID').innerText = "CARD ID: ---";
            document.getElementById('timerContainer').style.display = 'none';
            document.getElementById('scanArea').className = "relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50 transition-all duration-500";
            document.getElementById('statusIcon').innerHTML = `<svg class="w-28 h-28 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>`;
        }

        function triggerVoice(name, mssv, isStranger) {
            window.speechSynthesis.cancel();
            
            let message = "";
            if (isStranger) {
                message = "Phát hiện thẻ lạ, vui lòng quét lại nếu thẻ đã đăng ký";
            } else {
                message = `Điểm danh thành công. Sinh viên ${name}. Mã số ${mssv}`;
            }

            const utter = new SpeechSynthesisUtterance(message);
            utter.lang = 'vi-VN';
            utter.rate = 1.0; 
            utter.pitch = 1.1; 

            // Cố gắng chọn giọng nữ nếu có
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('vi') && (v.name.includes('Google') || v.name.includes('Female')));
            if (femaleVoice) utter.voice = femaleVoice;

            window.speechSynthesis.speak(utter);
        }

        function clearHistory() {
            if (confirm("Hành động này sẽ xóa toàn bộ danh sách điểm danh. Tiếp tục?")) {
                logs = [];
                document.getElementById('totalCount').innerText = "0";
                resetToDefault();
            }
        }

        function openPinModal() {
            if (logs.length === 0) return;
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('inputPin').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('inputPin').value = "";
        }

        function verifyAndExport() {
            if (document.getElementById('inputPin').value === MASTER_PIN) {
                closePinModal();
                let csv = "\uFEFFThời gian,Họ và Tên,Mã số Sinh viên,UID Thẻ,Trạng thái\n";
                [...logs].reverse().forEach(l => csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}",${l.type}\n`);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `DiemDanh_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
                a.click();
            } else {
                document.getElementById('inputPin').value = "";
                const modal = document.querySelector('#pinModal div');
                modal.classList.add('shake');
                setTimeout(() => modal.classList.remove('shake'), 500);
            }
        }
        
        // Khởi tạo giọng nói để sẵn sàng
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
