<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh - Lưu Trữ Đám Mây</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #f27024;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }

        .modern-card {
            background: var(--card);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .digital-clock {
            font-family: 'JetBrains Mono', monospace;
            color: var(--secondary);
        }

        @keyframes scanSuccess {
            0% { border-color: transparent; }
            50% { border-color: var(--success); box-shadow: 0 0 25px rgba(16, 185, 129, 0.1); }
            100% { border-color: transparent; }
        }

        .scan-anim {
            animation: scanSuccess 0.8s ease-out;
            border-width: 2px;
        }

        .sidebar-item {
            background: #ffffff;
            border-left: 4px solid var(--secondary);
        }

        .btn-register {
            background: linear-gradient(135deg, #f27024 0%, #ff8c42 100%);
        }

        .version-tag {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 9px;
            font-weight: 800;
            color: #cbd5e1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-200">
                <span class="font-black text-white text-xl italic">F</span>
            </div>
            <div>
                <h2 class="font-extrabold text-slate-800 tracking-tight leading-none text-sm">ATTENDANCE</h2>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Cloud Sync Mode</span>
            </div>
        </div>
        <div id="clock" class="digital-clock text-3xl font-bold bg-white px-4 py-1.5 rounded-xl shadow-sm border border-slate-100">
            00:00:00
        </div>
    </div>

    <!-- Layout Chính -->
    <div class="grid grid-cols-12 gap-4 pb-8">

        <!-- CỘT TRÁI -->
        <div class="col-span-12 lg:col-span-8 space-y-4">

            <!-- HIỂN THỊ CHÍNH -->
            <div id="main-card" class="modern-card rounded-[2rem] p-6 h-[320px] flex flex-col items-center justify-center relative">
                <div class="absolute top-6 left-8 flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[9px] font-bold tracking-widest text-slate-400 uppercase">Live Stream</span>
                </div>

                <div id="shift-label" class="absolute top-6 right-8 px-3 py-1 rounded-full bg-slate-50 text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100">
                    Đang xác định ca...
                </div>

                <div class="flex flex-col items-center">
                    <div class="mb-4">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-3xl border border-slate-100">👤</div>
                    </div>
                    <h1 id="focus-name" class="text-4xl font-extrabold text-slate-800 mb-1 tracking-tight uppercase text-center">---</h1>
                    <p id="focus-mssv" class="text-lg text-slate-400 font-semibold mb-2">Hệ thống sẵn sàng</p>
                    <p id="focus-class" class="text-sm text-blue-500 font-bold mb-4 uppercase tracking-wide">CHƯA CÓ LỚP</p>
                    <div id="status-badge" class="px-6 py-1.5 rounded-full bg-slate-50 text-slate-500 border border-slate-100 font-bold text-[10px] uppercase tracking-widest">
                        Đợi quẹt thẻ...
                    </div>
                </div>
            </div>

            <!-- BẢNG LỊCH SỬ -->
            <div class="modern-card rounded-[2rem] p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lịch sử điểm danh (Cloud Sync)</h3>
                    <div class="flex gap-2">
                        <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all flex items-center gap-1">
                            <span>📄</span> XUẤT EXCEL
                        </button>
                        <button onclick="clearHistory()" class="text-[9px] text-slate-300 hover:text-rose-500 font-bold uppercase transition-colors">Xóa</button>
                    </div>
                </div>
                <div class="overflow-y-auto max-h-[400px]">
                    <table class="w-full text-[11px]">
                        <thead>
                            <tr class="sticky top-0 bg-white border-b border-slate-50 text-slate-400 uppercase font-bold">
                                <th class="pb-3 text-left">Giờ</th>
                                <th class="pb-3 text-left">Sinh viên</th>
                                <th class="pb-3 text-left">MSSV</th>
                                <th class="pb-3 text-left">Lớp</th>
                                <th class="pb-3 text-right">TT</th>
                            </tr>
                        </thead>
                        <tbody id="history-rows" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="col-span-12 lg:col-span-4 space-y-3">
            <button onclick="openRegistrationManual()" class="btn-register w-full p-4 rounded-2xl flex items-center justify-between text-white shadow-md">
                <div class="text-left">
                    <p class="text-[8px] font-black opacity-80 uppercase">Cấu hình</p>
                    <h4 class="text-base font-bold uppercase tracking-tight">Đăng ký thẻ mới</h4>
                </div>
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl shadow-inner">🪪</div>
            </button>

            <div class="grid grid-cols-2 gap-3">
                <div class="modern-card p-4 rounded-2xl sidebar-item" style="border-left-color: #94a3b8;">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Sĩ số</p>
                    <h4 id="stat-total" class="text-xl font-bold text-slate-700">40</h4>
                </div>
                <div class="modern-card p-4 rounded-2xl sidebar-item" style="border-left-color: var(--success);">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Có mặt</p>
                    <h4 id="stat-present" class="text-xl font-bold text-emerald-500">0</h4>
                </div>
            </div>

            <div class="modern-card p-4 rounded-2xl sidebar-item" style="border-left-color: var(--danger);">
                <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Vắng</p>
                <h4 id="stat-absent" class="text-xl font-bold text-rose-500">40</h4>
            </div>

            <div class="modern-card p-6 rounded-[1.5rem] space-y-4">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2 tracking-widest text-center">Hệ thống</p>
                <div class="pt-3 border-t border-slate-50 flex flex-col items-center justify-center gap-2">
                    <div class="flex items-center gap-2">
                        <div id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                        <span id="connection-text" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Era: Offline</span>
                    </div>
                    <div id="sync-status" class="text-[7px] text-sky-400 font-black uppercase">Đang đồng bộ...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="version-tag">V1.0.5 Cloud Persistent</div>

    <!-- Tải Firebase & SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Global Era Widget
        const eraWidget = new EraWidget();
        let configUid, configName, configMssv, configClass;
        let lastScannedUID = "";
        let attendanceHistory = [];
        
        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'attendance-default';

        // Auth
        const initAuth = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    setupFirestoreListener();
                    document.getElementById('sync-status').innerText = "☁️ Cloud Synced";
                }
            });
        };

        // Lắng nghe dữ liệu từ Cloud
        const setupFirestoreListener = () => {
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            onSnapshot(historyRef, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                // Sắp xếp theo timestamp giảm dần
                attendanceHistory = data.sort((a, b) => b.timestamp - a.timestamp);
                renderHistory();
                updateStats();
            });
        };

        // Lưu bản ghi mới lên Cloud
        const saveAttendanceToCloud = async (record) => {
            try {
                const docId = `${record.timestamp}-${record.MSSV.replace(/\s/g, '')}`;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'history', docId);
                await setDoc(docRef, record);
            } catch (e) { console.error("Cloud Save Error:", e); }
        };

        // Xử lý khi quét thẻ
        const onAttendanceSuccess = async (name, mssv, className, uid) => {
            // Chuẩn hóa dữ liệu Class - Nếu Era trả về None hoặc chuỗi rỗng
            let cleanClass = "---";
            if (className && className !== "None" && className !== "NONE" && className !== "" && className !== "N/A") {
                cleanClass = className;
            }

            const displayName = (name && name !== "None" && name !== "N/A" && name !== "") ? name : "NGƯỜI LẠ";
            const displayMssv = (mssv && mssv !== "None" && mssv !== "N/A" && mssv !== "") ? mssv : "Chưa đăng ký";

            // Hiển thị giao diện chính
            document.getElementById('focus-name').innerText = displayName;
            document.getElementById('focus-mssv').innerText = displayMssv;
            document.getElementById('focus-class').innerText = cleanClass;
            document.getElementById('status-badge').innerText = "Đã quét";
            
            // Hiệu ứng
            const mainCard = document.getElementById('main-card');
            mainCard.classList.add('scan-anim');
            setTimeout(() => mainCard.classList.remove('scan-anim'), 2000);

            // Chỉ lưu nếu là bản ghi mới (tránh lặp thẻ trong 30s cùng 1 người)
            const isDuplicate = attendanceHistory.some(h => h.MSSV === displayMssv && (Date.now() - h.timestamp < 30000));
            
            if (!isDuplicate) {
                const record = {
                    time: new Date().toLocaleTimeString('vi-VN', { hour12: false }),
                    name: displayName,
                    MSSV: displayMssv,
                    class: cleanClass,
                    uid: uid,
                    timestamp: Date.now()
                };
                await saveAttendanceToCloud(record);
            }
        };

        // Khởi tạo Era
        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 5,
            onConfiguration: (configuration) => {
                configUid = configuration.realtime_configs[0];
                configName = configuration.realtime_configs[1];
                configMssv = configuration.realtime_configs[2];
                configClass = configuration.realtime_configs[3];
                document.getElementById('connection-dot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                document.getElementById('connection-text').innerText = "Era: Online";
            },
            onValues: (values) => {
                const uidVal = values[configUid?.id]?.value;
                const nameVal = values[configName?.id]?.value;
                const mssvVal = values[configMssv?.id]?.value;
                const classVal = values[configClass?.id]?.value;

                if (uidVal && uidVal !== "0" && uidVal !== "" && uidVal !== lastScannedUID) {
                    lastScannedUID = uidVal;
                    onAttendanceSuccess(nameVal, mssvVal, classVal, uidVal);
                }
            }
        });

        // Utils
        window.renderHistory = () => {
            const tbody = document.getElementById('history-rows');
            tbody.innerHTML = attendanceHistory.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="py-3 text-sky-600 font-bold">${item.time}</td>
                    <td class="py-3 font-bold text-slate-700 uppercase">${item.name}</td>
                    <td class="py-3 text-slate-400 font-semibold">${item.MSSV}</td>
                    <td class="py-3 text-blue-500 font-bold uppercase">${item.class || '---'}</td>
                    <td class="py-3 text-right"><span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full font-bold">OK</span></td>
                </tr>
            `).join('');
        };

        window.updateStats = () => {
            const total = 40;
            // Đếm số sinh viên duy nhất đã điểm danh
            const present = new Set(attendanceHistory.filter(h => h.MSSV !== "Chưa đăng ký").map(h => h.MSSV)).size;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-present').innerText = present;
            document.getElementById('stat-absent').innerText = Math.max(0, total - present);
        };

        window.clearHistory = async () => {
            if (confirm("Xóa toàn bộ lịch sử điểm danh trên Cloud?")) {
                const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                // Lưu ý: Trong môi trường này ta xóa từng cái thủ công
                attendanceHistory.forEach(async (item) => {
                    const docId = `${item.timestamp}-${item.MSSV.replace(/\s/g, '')}`;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', docId));
                });
                lastScannedUID = "";
            }
        };

        window.exportToExcel = () => {
            if (attendanceHistory.length === 0) return;
            const exportData = attendanceHistory.map(h => ({
                "Thời gian": h.time,
                "Họ Tên": h.name,
                "MSSV": h.MSSV,
                "Lớp": h.class,
                "Mã thẻ UID": h.uid
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(exportData);
            XLSX.utils.book_append_sheet(wb, ws, "DiemDanh");
            XLSX.writeFile(wb, `DiemDanh_Cloud_${new Date().toLocaleDateString()}.xlsx`);
        };

        // Đồng hồ
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN', { hour12: false });
        }, 1000);

        initAuth();
    </script>
</body>
</html>
