<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Điểm Danh RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 1.5rem; }
        .status-badge { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
        .online { background-color: #ecfdf5; color: #10b981; border: 1px solid #d1fae5; }
        .online .dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        .offline { background-color: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .offline .dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; }
        
        .btn-primary { background-color: #72e128; color: white; font-weight: 700; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
        
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .input-group input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: #6366f1; }

        #regForm { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: top; }
        .form-open { animation: slideDown 0.4s ease-out; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-6 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-12 gap-6">
            
            <!-- Cột Trái: Chính -->
            <div class="col-span-12 lg:col-span-8 space-y-6">
                <!-- Header -->
                <div class="card">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h1 class="text-xl font-bold text-slate-800">Hệ Thống Điểm Danh RFID</h1>
                            <p class="text-xs text-slate-400 font-medium">Tự động nhận diện thành viên & Đăng ký thẻ mới</p>
                        </div>
                        <div id="cloudStatus" class="status-badge offline">
                            <div class="dot"></div>
                            <span>Checking...</span>
                        </div>
                    </div>

                    <!-- Màn hình quét -->
                    <div id="scanArea" class="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/30 transition-all duration-500">
                        <div id="scanIndicator" class="mb-2 hidden">
                            <span class="px-3 py-1 bg-rose-100 text-rose-600 text-[10px] font-bold rounded-full animate-pulse uppercase">Phát hiện thẻ lạ</span>
                        </div>
                        <h2 id="scanStatus" class="text-4xl font-black text-slate-300 uppercase tracking-tight text-center px-6">Vui lòng quét thẻ</h2>
                        <div id="uidDisplay" class="mt-4 bg-slate-200 text-slate-500 px-4 py-1 rounded font-mono text-xs italic tracking-widest">--- --- ---</div>
                    </div>
                </div>

                <!-- Form Đăng Ký (Ẩn mặc định, hiện khi quét thẻ lạ) -->
                <div id="regForm" class="card hidden shadow-xl border-indigo-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-700 flex items-center gap-2">
                            <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                            </div>
                            Đăng Ký Thành Viên Mới
                        </h3>
                        <button onclick="closeForm()" class="text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>Họ và tên sinh viên</label>
                            <input type="text" id="regName" placeholder="Ví dụ: Nguyễn Văn A">
                        </div>
                        <div class="input-group">
                            <label>Mã số sinh viên (MSSV)</label>
                            <input type="text" id="regMssv" placeholder="Ví dụ: PS12345">
                        </div>
                    </div>

                    <div class="mt-6 flex gap-3">
                        <button onclick="saveUser()" class="btn-primary flex-1 py-4 rounded-xl text-sm shadow-lg shadow-green-200">
                            Xác nhận lưu thông tin
                        </button>
                    </div>
                </div>
            </div>

            <!-- Cột Phải: Thống kê & Export -->
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="card text-center py-8">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Thống kê phiên này</p>
                    <div class="flex items-center justify-around">
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Tổng lượt</p>
                            <p id="totalCount" class="text-5xl font-black text-slate-800">0</p>
                        </div>
                        <div class="w-[1px] h-12 bg-slate-100"></div>
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Giờ cuối</p>
                            <p id="lastTime" class="text-5xl font-black text-slate-800">--:--</p>
                        </div>
                    </div>
                </div>

                <div class="card space-y-3">
                    <button onclick="exportExcel()" class="btn-primary w-full py-4 rounded-xl text-xs shadow-md">
                        XUẤT DỮ LIỆU ĐIỂM DANH (CSV)
                    </button>
                    
                    <button onclick="window.location.reload()" class="w-full py-2 text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-indigo-600 transition-colors">
                        Làm mới trang
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configUID, configName, configMSSV;
        let logs = [];
        let lastUID = "";
        let lastTime = 0;

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                // Cloud Status
                const cloud = document.getElementById('cloudStatus');
                const isOnline = configUID && v[configUID.id]?.active;
                if (isOnline) {
                    cloud.className = "status-badge online";
                    cloud.innerHTML = '<div class="dot"></div><span>Cloud Online</span>';
                } else {
                    cloud.className = "status-badge offline";
                    cloud.innerHTML = '<div class="dot"></div><span>Cloud Offline</span>';
                }

                // Scan Logic
                const uid = v[configUID?.id]?.value;
                if (uid && uid !== "0" && uid !== "---" && uid !== "None") {
                    const name = v[configName?.id]?.value || "---";
                    const mssv = v[configMSSV?.id]?.value || "---";
                    
                    const now = Date.now();
                    if (uid !== lastUID || (now - lastTime > 2500)) {
                        handleScan(uid, name, mssv);
                        lastUID = uid;
                        lastTime = now;
                    }
                }
            }
        });

        function handleScan(uid, name, mssv) {
            const scanStatus = document.getElementById('scanStatus');
            const uidDisplay = document.getElementById('uidDisplay');
            const totalCount = document.getElementById('totalCount');
            const lastTimeDisplay = document.getElementById('lastTime');
            const scanArea = document.getElementById('scanArea');
            const scanIndicator = document.getElementById('scanIndicator');
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });

            uidDisplay.innerText = uid;
            
            const isUnknown = (!name || name === "None" || name === "---" || name.includes("lạ"));

            if (isUnknown) {
                scanStatus.innerText = "THẺ LẠ!";
                scanStatus.className = "text-4xl font-black text-rose-500 uppercase tracking-tight text-center px-6";
                scanArea.style.borderColor = "#f43f5e";
                scanIndicator.classList.remove('hidden');
                openForm();
            } else {
                scanStatus.innerText = name.toUpperCase();
                scanStatus.className = "text-4xl font-black text-indigo-600 uppercase tracking-tight text-center px-6";
                scanArea.style.borderColor = "#6366f1";
                scanIndicator.classList.add('hidden');
                closeForm();

                logs.unshift({ id: logs.length + 1, time: timeStr, name: name, mssv: mssv, uid: uid });
                totalCount.innerText = logs.length;
                lastTimeDisplay.innerText = timeStr.substring(0, 5);
            }

            setTimeout(() => {
                if (lastUID === uid && !isUnknown) {
                    scanStatus.innerText = "Vui lòng quét thẻ";
                    scanStatus.className = "text-4xl font-black text-slate-300 uppercase tracking-tight text-center px-6";
                    scanArea.style.borderColor = "#e5e7eb";
                    uidDisplay.innerText = "--- --- ---";
                }
            }, 5000);
        }

        function openForm() {
            const form = document.getElementById('regForm');
            form.classList.remove('hidden');
            form.classList.add('form-open');
            document.getElementById('regName').focus();
        }

        function closeForm() {
            const form = document.getElementById('regForm');
            form.classList.add('hidden');
            clearForm();
        }

        function saveUser() {
            const name = document.getElementById('regName').value;
            const mssv = document.getElementById('regMssv').value;
            const uid = document.getElementById('uidDisplay').innerText;
            if (!name) { alert("Vui lòng nhập họ tên sinh viên!"); return; }
            alert(`Đã nhận đăng ký thành công cho:\n- ${name}\n- MSSV: ${mssv}\n- Thẻ: ${uid}`);
            closeForm();
        }

        function clearForm() {
            document.getElementById('regName').value = "";
            document.getElementById('regMssv').value = "";
        }

        function exportExcel() {
            if (logs.length === 0) { alert("Không có dữ liệu để xuất!"); return; }
            let csv = "\uFEFFSTT,Giờ Quét,Họ và Tên,Mã Số,UID Thẻ\n";
            logs.forEach(l => csv += `${l.id},${l.time},"${l.name}","${l.mssv}","'${l.uid}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `diem_danh_${new Date().getTime()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
