<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Điểm Danh RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 1.5rem; }
        .btn-primary { background-color: #72e128; color: white; font-weight: 700; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
        .scan-area { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-6 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-12 gap-6">
            
            <!-- Khu vực quét thẻ chính -->
            <div class="col-span-12 lg:col-span-8 space-y-6">
                <div class="card">
                    <div class="mb-6">
                        <h1 class="text-xl font-bold text-slate-800">Hệ Thống Điểm Danh</h1>
                        <p class="text-xs text-slate-400 font-medium">Vui lòng đưa thẻ lại gần đầu đọc</p>
                    </div>

                    <div id="scanArea" class="scan-area h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                        <div id="scanIndicator" class="mb-2 hidden">
                            <span class="px-3 py-1 bg-rose-100 text-rose-600 text-[10px] font-bold rounded-full animate-pulse">THẺ CHƯA ĐĂNG KÝ</span>
                        </div>
                        <h2 id="scanStatus" class="text-4xl font-black text-slate-300 uppercase tracking-tight text-center px-6 transition-colors">Sẵn sàng quét</h2>
                        <div id="uidDisplay" class="mt-4 bg-slate-200 text-slate-500 px-4 py-1 rounded font-mono text-xs italic tracking-widest">--- --- ---</div>
                    </div>
                </div>
            </div>

            <!-- Khu vực thống kê và chức năng -->
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="card text-center py-10">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Thống kê</p>
                    <div class="flex items-center justify-around">
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Số lượt</p>
                            <p id="totalCount" class="text-5xl font-black text-slate-800">0</p>
                        </div>
                        <div class="w-[1px] h-12 bg-slate-100"></div>
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Giờ cuối</p>
                            <p id="lastTime" class="text-5xl font-black text-slate-800">--:--</p>
                        </div>
                    </div>
                </div>

                <div class="card space-y-3">
                    <button onclick="exportExcel()" class="btn-primary w-full py-4 rounded-xl text-xs shadow-md">
                        XUẤT DỮ LIỆU (CSV)
                    </button>
                    <button onclick="window.location.reload()" class="w-full py-2 text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-indigo-600 transition-colors">
                        Làm mới hệ thống
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configUID, configName, configMSSV;
        let logs = [];
        let lastUID = "";
        let lastTime = 0;

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                const uid = v[configUID?.id]?.value;
                
                // Chỉ xử lý nếu UID có giá trị thật
                if (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "Waiting...") {
                    const name = v[configName?.id]?.value || "---";
                    const mssv = v[configMSSV?.id]?.value || "---";
                    const now = Date.now();

                    // Chống lặp thẻ (Delay 3 giây cho cùng 1 thẻ)
                    if (uid !== lastUID || (now - lastTime > 3000)) {
                        processScan(uid, name, mssv);
                        lastUID = uid;
                        lastTime = now;
                    }
                }
            }
        });

        function processScan(uid, name, mssv) {
            const scanStatus = document.getElementById('scanStatus');
            const uidDisplay = document.getElementById('uidDisplay');
            const totalCount = document.getElementById('totalCount');
            const lastTimeDisplay = document.getElementById('lastTime');
            const scanArea = document.getElementById('scanArea');
            const scanIndicator = document.getElementById('scanIndicator');
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });

            uidDisplay.innerText = uid;
            
            // Logic nhận diện thẻ lạ
            const isStranger = (!name || name === "None" || name === "---" || name.includes("lạ") || name === "Sẵn sàng" || name === "Waiting...");

            if (isStranger) {
                scanStatus.innerText = "THẺ LẠ!";
                scanStatus.className = "text-4xl font-black text-rose-500 uppercase tracking-tight text-center px-6";
                scanArea.className = "scan-area h-64 flex flex-col items-center justify-center border-2 border-rose-400 rounded-2xl bg-rose-50/50";
                scanIndicator.classList.remove('hidden');
                logs.unshift({ id: logs.length + 1, time: timeStr, name: "Thẻ lạ", mssv: "N/A", uid: uid });
            } else {
                scanStatus.innerText = name.toUpperCase();
                scanStatus.className = "text-4xl font-black text-indigo-600 uppercase tracking-tight text-center px-6";
                scanArea.className = "scan-area h-64 flex flex-col items-center justify-center border-2 border-indigo-400 rounded-2xl bg-indigo-50/50";
                scanIndicator.classList.add('hidden');
                logs.unshift({ id: logs.length + 1, time: timeStr, name: name, mssv: mssv, uid: uid });
            }

            totalCount.innerText = logs.length;
            lastTimeDisplay.innerText = timeStr.substring(0, 5);

            // Tự động quay về trạng thái chờ sau 5 giây
            setTimeout(() => {
                if (lastUID === uid) {
                    scanStatus.innerText = "Sẵn sàng quét";
                    scanStatus.className = "text-4xl font-black text-slate-300 uppercase tracking-tight text-center px-6";
                    scanArea.className = "scan-area h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50";
                    uidDisplay.innerText = "--- --- ---";
                    scanIndicator.classList.add('hidden');
                }
            }, 5000);
        }

        function exportExcel() {
            if (logs.length === 0) {
                alert("Không có dữ liệu trong phiên này.");
                return;
            }
            let csv = "\uFEFFSTT,Giờ Quét,Họ và Tên,Mã Số,UID Thẻ\n";
            [...logs].reverse().forEach((l, idx) => {
                csv += `${idx + 1},${l.time},"${l.name}","${l.mssv}","'${l.uid}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `diem_danh_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }
    </script>
</body>
</html>
