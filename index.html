<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed layout-compact" dir="ltr" data-theme="theme-default">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>RFID Check-in Pro</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/fonts/boxicons.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/core.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/theme-default.css" />
  
  <style>
    body { background-color: #f4f7fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    .system-border-wrapper { max-width: 550px; margin: 20px auto; padding: 10px; border: 4px solid #000000; border-radius: 50px; background-color: #f4f7fa; }
    .container-main { padding: 30px; }
    .header-section { margin-bottom: 25px; position: relative; }
    .header-title { font-weight: 800; font-size: 2.2rem; color: #1a202c; margin-bottom: 0; letter-spacing: -0.02em; }
    .digital-clock { font-size: 0.9rem; color: #a0aec0; font-weight: 600; margin-top: 5px; }

    .scan-card {
        background: #ffffff;
        border-radius: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        padding: 50px 30px;
        text-align: center;
        margin-bottom: 20px;
        border: 4px solid transparent;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .scan-card.active-success { border-color: #696cff; background: #f8f9ff; transform: scale(1.02); }
    .scan-card.active-warning { border-color: #ff3e1d !important; background: #fff5f4 !important; transform: scale(1.02); }

    .qr-placeholder { font-size: 4.5rem; color: #edf2f7; margin-bottom: 25px; transition: all 0.3s; }
    .instruction-text { font-weight: 800; font-size: 1.8rem; color: #4a5568; text-transform: uppercase; margin-bottom: 8px; }
    .sub-text { color: #a0aec0; font-size: 1.2rem; margin-bottom: 25px; font-weight: 500; min-height: 1.5em; }
    .uid-badge { background: #f1f5f9; color: #94a3b8; padding: 6px 20px; border-radius: 20px; font-family: monospace; font-size: 0.9rem; font-weight: bold; }

    .stat-card { background: white; border-radius: 30px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); display: flex; flex-direction: column; justify-content: center; }
    .stat-label { font-size: 0.7rem; font-weight: 800; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 2.5rem; font-weight: 800; color: #1a202c; line-height: 1; }

    .btn-action { background: white; border-radius: 20px; padding: 15px; border: 2px solid #f0f0f0; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
    
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .shake { animation: shake 0.4s ease-in-out; }
    .status-active { opacity: 0.5; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
  </style>
</head>

<body>
  <div class="system-border-wrapper">
    <div class="container-main">
      <div class="header-section">
        <h1 class="header-title">RFID Check-in</h1>
        <div id="liveClock" class="digital-clock">00:00:00 - 01/01/2024</div>
      </div>

      <div id="statusBox" class="scan-card">
        <i id="statusIcon" class="bx bx-rfid qr-placeholder status-active"></i>
        <h3 id="instruction" class="instruction-text">Sẵn sàng</h3>
        <div id="subText" class="sub-text">Vui lòng chạm thẻ</div>
        <div class="uid-badge" id="cardUIDDisplay">ID: ---</div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <div class="stat-card h-100">
            <span class="stat-label">Tổng lượt</span>
            <span id="statTotal" class="stat-value">0</span>
          </div>
        </div>
        <div class="col-6 d-flex flex-column gap-2">
          <button onclick="exportCSV()" class="btn-action w-100 text-primary"><i class="bx bx-download"></i> Xuất CSV</button>
          <button onclick="clearHistory()" class="btn-action w-100 text-danger"><i class="bx bx-trash"></i> Xóa dữ liệu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
  <script>
    const eraWidget = new EraWidget();
    let configMap = { uid: null, name: null, mssv: null };
    let lastUid = "";
    let isLocked = false;
    let logs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];

    document.getElementById('statTotal').innerText = logs.length;

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('vi-VN') + " - " + now.toLocaleDateString('vi-VN');
    }
    setInterval(updateClock, 1000);

    eraWidget.init({
        needRealtimeConfigs: true,
        onConfiguration: (c) => {
            c.realtime_configs.forEach(cfg => {
                if (cfg.name.toUpperCase() === "UID") configMap.uid = cfg.id;
                if (cfg.name.toUpperCase() === "NAME") configMap.name = cfg.id;
                if (cfg.name.toUpperCase().includes("MSSV")) configMap.mssv = cfg.id;
            });
        },
        onValues: (v) => {
            if (!configMap.uid || !v[configMap.uid]) return;
            const currentUid = v[configMap.uid].value;

            // Chỉ xử lý nếu có UID mới và không bị khóa
            if (currentUid && currentUid !== "0" && currentUid !== "---" && currentUid !== lastUid && !isLocked) {
                lastUid = currentUid;
                // Đợi 800ms để đảm bảo Name và MSSV từ ESP32 đã cập nhật xong trên Cloud
                setTimeout(() => {
                    const name = v[configMap.name]?.value || "Người lạ";
                    const mssv = v[configMap.mssv]?.value || "---";
                    processScan(currentUid, name, mssv);
                }, 800);
            }
        }
    });

    function processScan(uid, name, mssv) {
        isLocked = true;
        const isStranger = (name === "Người lạ" || name.toUpperCase() === "NGUOI LA" || name === "---");
        
        const box = document.getElementById('statusBox');
        const icon = document.getElementById('statusIcon');
        const instr = document.getElementById('instruction');
        const subT = document.getElementById('subText');
        const uidD = document.getElementById('cardUIDDisplay');

        uidD.innerText = "ID: " + uid;
        instr.innerText = isStranger ? "Người lạ" : name;
        subT.innerText = isStranger ? "Thẻ chưa đăng ký" : "MSSV: " + mssv;

        if (isStranger) {
            box.className = "scan-card active-warning shake";
            icon.className = "bx bx-error-circle qr-placeholder text-danger";
        } else {
            box.className = "scan-card active-success";
            icon.className = "bx bxs-check-circle qr-placeholder text-primary";
        }

        // Lưu log
        logs.unshift({ time: new Date().toLocaleTimeString(), name: instr.innerText, mssv, uid });
        localStorage.setItem('attendanceLogs', JSON.stringify(logs));
        document.getElementById('statTotal').innerText = logs.length;

        // Reset trạng thái sau 4 giây để sẵn sàng cho thẻ tiếp theo
        setTimeout(() => {
            box.className = "scan-card";
            icon.className = "bx bx-rfid qr-placeholder status-active";
            instr.innerText = "Sẵn sàng";
            subT.innerText = "Vui lòng chạm thẻ";
            isLocked = false;
            lastUid = ""; // Xóa bộ nhớ UID cũ để có thể quẹt lại chính thẻ đó
        }, 4000);
    }

    function exportCSV() {
        if (logs.length === 0) return alert("Không có dữ liệu");
        let csv = "\uFEFFGiờ,Tên,MSSV,UID\n";
        logs.forEach(l => csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}"\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RFID_Log.csv`;
        link.click();
    }

    function clearHistory() {
        if (confirm("Xóa toàn bộ?")) {
            logs = [];
            localStorage.clear();
            location.reload();
        }
    }
  </script>
</body>
</html>
