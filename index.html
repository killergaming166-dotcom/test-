<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Scanner - Instant Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); padding: 2.5rem; width: 100%; max-width: 480px; position: relative; }
        
        #pinModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .cooldown-overlay {
            background: rgba(255, 255, 255, 0.98);
            display: none;
            border-radius: 40px;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-icon-container { transition: all 0.3s ease; }
        .success-bg { background-color: #ecfdf5; border-color: #10b981; }
        .error-bg { background-color: #fef2f2; border-color: #ef4444; }
    </style>
</head>
<body class="p-4">

    <!-- Modal PIN -->
    <div id="pinModal">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-xs text-center">
            <h3 class="text-xl font-black mb-6 text-slate-800">MÃ PIN</h3>
            <input type="password" id="inputPin" class="w-full text-center text-3xl font-black border-b-2 border-slate-200 focus:border-indigo-500 outline-none mb-8 pb-2" placeholder="••••" maxlength="4">
            <div class="flex gap-3">
                <button onclick="closePinModal()" class="flex-1 py-3 text-slate-400 font-bold text-xs uppercase">Hủy</button>
                <button onclick="verifyAndExport()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase">Xác nhận</button>
            </div>
        </div>
    </div>

    <div class="card space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">RFID SCANNER</h1>
                <div class="flex items-center mt-1">
                    <span id="connectionDot" class="w-2 h-2 bg-emerald-500 rounded-full animate-ping mr-2"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sẵn sàng kết nối</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Đã quét</p>
                <p id="totalCount" class="text-4xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <!-- Main Scan Area -->
        <div id="scanArea" class="relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50 transition-all duration-300">
            
            <!-- Cooldown Overlay -->
            <div id="cooldownLayer" class="cooldown-overlay absolute inset-0">
                <div id="cooldownTimer" class="text-9xl font-black text-slate-800 tabular-nums">8</div>
                <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-[10px] mt-4">Đang nghỉ để tránh trùng...</p>
                <button onclick="resetScanner()" class="mt-8 text-[10px] font-black text-indigo-500 bg-indigo-50 px-6 py-3 rounded-full hover:bg-indigo-100 uppercase">Tiếp tục ngay</button>
            </div>

            <!-- Icon -->
            <div id="statusIcon" class="status-icon-container mb-6 text-slate-200">
                <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>
            </div>
            
            <div class="text-center px-6">
                <h2 id="displayName" class="text-3xl font-black text-slate-300 uppercase leading-tight">Chạm thẻ</h2>
                <p id="displayMSSV" class="text-lg font-bold text-slate-400 mt-2 h-6"></p>
            </div>

            <div id="displayUID" class="absolute bottom-10 px-6 py-2 bg-white border border-slate-100 rounded-full text-[11px] font-mono font-bold text-slate-400">
                CHỜ DỮ LIỆU...
            </div>
        </div>

        <!-- Action Bar -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openPinModal()" class="py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] tracking-widest uppercase shadow-xl active:scale-95 transition-transform">
                XUẤT FILE CSV
            </button>
            <button onclick="clearHistory()" class="bg-red-50 text-red-500 py-4 rounded-2xl font-black text-[10px] tracking-widest uppercase hover:bg-red-100 transition-colors">
                XÓA LỊCH SỬ
            </button>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const MASTER_PIN = "0909";
        const COOLDOWN_TIME = 8000;
        
        const eraWidget = new EraWidget();
        let logs = [];
        let configUID, configName, configMSSV;
        
        let isCooldown = false;
        let lastScannedUID = null; 
        let countdownInterval = null;

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                const uid = v[configUID?.id]?.value;
                const name = v[configName?.id]?.value || "NGƯỜI LẠ";
                const mssv = v[configMSSV?.id]?.value || "---";

                // Kiểm tra xem có thẻ không
                const hasCard = (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "" && uid !== "Sẵn sàng");

                if (hasCard) {
                    // 1. Nếu đang cooldown thì bỏ qua
                    if (isCooldown) return;

                    // 2. Nếu thẻ trùng với lần vừa quét (chưa nhấc ra) thì bỏ qua
                    if (uid === lastScannedUID) return;

                    // 3. Thực hiện quét ngay lập tức
                    executeScan(uid, name, mssv);
                } else {
                    // Thẻ đã được nhấc ra khỏi đầu đọc -> Reset UID cuối để cho phép quét lại chính thẻ đó
                    lastScannedUID = null;
                }
            }
        });

        function executeScan(uid, name, mssv) {
            isCooldown = true;
            lastScannedUID = uid;

            const isStranger = (name.toUpperCase().includes("NGUOI LA") || mssv === "---" || name === "NGƯỜI LẠ");
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            
            logs.unshift({ time: timeStr, name, mssv, uid, type: isStranger ? 'NGƯỜI LẠ' : 'SINH VIÊN' });
            document.getElementById('totalCount').innerText = logs.length;

            // Cập nhật giao diện
            updateUI(uid, name, mssv, isStranger);
            
            // Bắt đầu nghỉ 8s
            startCooldown();
        }

        function updateUI(uid, name, mssv, isError) {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = name.toUpperCase();
            dm.innerText = mssv;
            du.innerText = `ID: ${uid}`;

            if (isError) {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-red-500 rounded-[48px] bg-red-50 shake";
                si.className = "status-icon-container mb-6 text-red-500 scale-110";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-emerald-500 rounded-[48px] bg-emerald-50 scale-[1.02]";
                si.className = "status-icon-container mb-6 text-emerald-500 scale-110";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
            }
        }

        function startCooldown() {
            const overlay = document.getElementById('cooldownLayer');
            const timerText = document.getElementById('cooldownTimer');
            overlay.style.display = 'flex';
            
            let timeLeft = 8;
            timerText.innerText = timeLeft;

            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    resetScanner();
                }
            }, 1000);
        }

        function resetScanner() {
            isCooldown = false;
            clearInterval(countdownInterval);
            document.getElementById('cooldownLayer').style.display = 'none';
            
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = "Chạm thẻ";
            dn.className = "text-3xl font-black text-slate-300 uppercase leading-tight";
            dm.innerText = "";
            du.innerText = "CHỜ DỮ LIỆU...";
            sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50";
            si.className = "status-icon-container mb-6 text-slate-200 scale-100";
            si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>`;
        }

        function clearHistory() {
            if (confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử quét?")) {
                logs = [];
                document.getElementById('totalCount').innerText = "0";
                resetScanner();
            }
        }

        function openPinModal() {
            if (logs.length === 0) return;
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('inputPin').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('inputPin').value = "";
        }

        function verifyAndExport() {
            const pin = document.getElementById('inputPin').value;
            if (pin === MASTER_PIN) {
                closePinModal();
                let csv = "\uFEFFGiờ,Họ Tên,Mã Số,UID,Phân Loại\n";
                [...logs].reverse().forEach(l => {
                    csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}",${l.type}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `RFID_Log_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            } else {
                document.getElementById('inputPin').value = "";
                document.querySelector('#pinModal div').classList.add('shake');
                setTimeout(() => document.querySelector('#pinModal div').classList.remove('shake'), 500);
            }
        }
    </script>
</body>
</html>
