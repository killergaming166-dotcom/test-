<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điểm Danh - Era</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
            color: #334155; 
            padding: 1.5rem;
        }

        .card-main {
            background: #ffffff;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid #ffffff;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .stat-card.active-green { border-left: 6px solid #10b981; }
        .stat-card.active-red { border-left: 6px solid #f43f5e; }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-size: 1.2rem;
        }

        .stat-icon.green { color: #10b981; background: #ecfdf5; }
        .stat-icon.red { color: #f43f5e; background: #fff1f2; }

        .avatar-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .avatar-container i { color: #e2e8f0; font-size: 5rem; }

        .digital-clock {
            font-size: 4.5rem;
            font-weight: 800;
            color: #334155;
            line-height: 1;
        }

        .input-field {
            background: #f8fafc;
            border: 1px solid #eef2f6;
            border-radius: 15px;
            padding: 12px 15px;
            width: 100%;
            font-size: 14px;
        }

        .btn-action {
            background: #ff7d29;
            color: white;
            border-radius: 15px;
            padding: 12px 25px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        .tag-status {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .custom-table-container::-webkit-scrollbar { width: 4px; }
        .custom-table-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="max-w-[1400px] mx-auto">

    <!-- Header Section -->
    <div class="flex justify-between items-start mb-6 px-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center font-bold text-[#ff7d29] text-xl">F</div>
            <div>
                <h1 class="text-2xl font-extrabold text-[#0f172a] tracking-tight">DASHBOARD</h1>
                <div class="flex items-center gap-2">
                    <span id="era-dot" class="w-2 h-2 rounded-full bg-rose-500"></span>
                    <span id="era-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">LIVE ATTENDANCE SYSTEM</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div class="digital-clock" id="clock">00:00:00</div>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-6">
        <!-- Cột trái -->
        <div class="col-span-8 space-y-6">
            <div class="card-main p-10 flex flex-col items-center justify-center relative min-h-[480px]">
                <div class="absolute top-8 left-8 flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                    <span id="session-status-dot" class="w-2 h-2 rounded-full bg-rose-400"></span>
                    <span id="session-status-text" class="text-[10px] font-extrabold text-slate-400 uppercase tracking-tighter">DISCONNECTED</span>
                </div>
                <div id="ca-display-badge" class="absolute top-8 right-8 bg-[#0f172a] text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase">CA --</div>

                <div class="avatar-container">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="text-center">
                    <div class="flex justify-center gap-1.5 mb-6">
                        <div class="w-10 h-1.5 bg-slate-800 rounded-full"></div>
                        <div class="w-10 h-1.5 bg-slate-800 rounded-full"></div>
                        <div class="w-10 h-1.5 bg-slate-800 rounded-full"></div>
                    </div>
                    <h2 id="display-name" class="text-3xl font-black text-slate-800 uppercase tracking-[0.2em] mb-3">ĐANG ĐỢI THẺ...</h2>
                    <div class="flex items-center justify-center gap-2 text-blue-500 font-bold text-[11px] uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> SẴN SÀNG
                    </div>
                </div>
            </div>

            <!-- Đăng ký -->
            <div class="card-main p-8 border-l-[10px] border-[#ff7d29]">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-[#ff7d29]">
                        <i class="fa-solid fa-id-card"></i>
                    </div>
                    <h3 class="font-extrabold text-slate-800 uppercase text-sm tracking-tight">ĐĂNG KÝ THẺ THÀNH VIÊN</h3>
                </div>
                <div class="grid grid-cols-12 gap-4 items-end">
                    <div class="col-span-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block">MÃ UID</label>
                        <input type="text" id="reg-uid" placeholder="UID..." class="input-field">
                    </div>
                    <div class="col-span-3">
                        <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block">HỌ VÀ TÊN</label>
                        <input type="text" id="reg-name" placeholder="Tên SV..." class="input-field">
                    </div>
                    <div class="col-span-3">
                        <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block">MSSV / ID</label>
                        <input type="text" id="reg-mssv" placeholder="MSSV..." class="input-field">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block">LỚP / BỘ PHẬN</label>
                        <input type="text" id="reg-class" placeholder="Lớp..." class="input-field">
                    </div>
                    <div class="col-span-2">
                        <button class="btn-action w-full flex items-center justify-center gap-2">
                            <i class="fa-solid fa-check"></i> XÁC NHẬN
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bảng lịch sử -->
            <div class="card-main overflow-hidden p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-black text-slate-800 text-xl tracking-tight">Lịch sử điểm danh</h3>
                    <div class="flex gap-2">
                        <button onclick="exportToExcel()" class="bg-[#2563eb] text-white text-[11px] font-bold py-2.5 px-6 rounded-xl uppercase flex items-center gap-2 shadow-md shadow-blue-100">
                            <i class="fa-solid fa-file-export"></i> XUẤT EXCEL
                        </button>
                        <button onclick="clearLogs()" class="bg-white text-rose-500 text-[11px] font-bold py-2.5 px-6 rounded-xl uppercase border border-rose-100 hover:bg-rose-50">XÓA DỮ LIỆU</button>
                    </div>
                </div>
                <div class="custom-table-container max-h-[400px] overflow-y-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b pb-4">
                                <th class="pb-4">THỜI GIAN</th>
                                <th class="pb-4">SINH VIÊN</th>
                                <th class="pb-4">MSSV</th>
                                <th class="pb-4">LỚP</th>
                                <th class="pb-4">TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Cột phải (Thống kê) -->
        <div class="col-span-4 space-y-6">
            <div class="stat-card">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">SĨ SỐ LỚP</p>
                    <h4 class="text-5xl font-extrabold text-slate-800" id="total-count">40</h4>
                </div>
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
            </div>

            <div class="stat-card active-green">
                <div>
                    <p class="text-[10px] font-bold text-emerald-500 uppercase mb-1 tracking-wider">HIỆN DIỆN</p>
                    <h4 class="text-5xl font-extrabold text-slate-800" id="present-count">0</h4>
                </div>
                <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
            </div>

            <div class="stat-card active-red">
                <div>
                    <p class="text-[10px] font-bold text-rose-500 uppercase mb-1 tracking-wider">VẮNG MẶT</p>
                    <h4 class="text-5xl font-extrabold text-rose-500" id="absent-count">40</h4>
                </div>
                <div class="stat-icon red"><i class="fa-solid fa-circle-xmark"></i></div>
            </div>

            <div class="card-main p-8">
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                    <h3 class="font-extrabold text-slate-800 uppercase text-sm tracking-tight">Timeline</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-[#f8fbff] p-5 rounded-3xl text-center border border-blue-50">
                        <p class="text-[9px] font-bold text-blue-400 uppercase mb-2">BẮT ĐẦU</p>
                        <p id="time-start" class="text-2xl font-black text-slate-700">--:--</p>
                    </div>
                    <div class="bg-[#f8fbff] p-5 rounded-3xl text-center border border-blue-50">
                        <p class="text-[9px] font-bold text-blue-400 uppercase mb-2">KẾT THÚC</p>
                        <p id="time-end" class="text-2xl font-black text-slate-700">--:--</p>
                    </div>
                </div>
                <div class="bg-emerald-50/50 border border-emerald-100 p-4 rounded-2xl flex justify-between items-center mb-4">
                    <span id="hardware-status" class="text-[10px] font-black text-emerald-600 uppercase tracking-tighter">ESP32: WAITING...</span>
                    <span id="hardware-dot" class="w-2 h-2 rounded-full bg-slate-200"></span>
                </div>
                <button class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-2xl text-[11px] uppercase tracking-[0.1em]">RECONNECT</button>
            </div>
        </div>
    </div>

    <script>
        const eraWidget = new EraWidget();
        let configPins = { uid: null, name: null, mssv: null, class: null };
        const logs = [];
        
        // BIẾN QUAN TRỌNG ĐỂ FIX LỖI ĐỌC 2 LẦN
        let lastUidScan = "";
        let lastScanTime = 0;
        let isProcessing = false;

        const SHIFTS = [
            { name: "CA 1", start: "07:00", end: "09:15" },
            { name: "CA 2", start: "09:15", end: "11:30" },
            { name: "CA NGHỈ", start: "11:30", end: "12:59" },
            { name: "CA 3", start: "13:00", end: "15:00" },
            { name: "CA 4", start: "15:00", end: "17:00" },
            { name: "CA 5", start: "17:00", end: "19:00" }
        ];

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 4,
            onConfiguration: (config) => {
                configPins.uid = config.realtime_configs[0];
                configPins.name = config.realtime_configs[1];
                configPins.mssv = config.realtime_configs[2];
                configPins.class = config.realtime_configs[3];
                document.getElementById('era-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('era-status').innerText = "ONLINE";
                document.getElementById('hardware-status').innerText = "ESP32: CONNECTED";
                document.getElementById('hardware-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
            },
            onValues: (values) => {
                const uidVal = values[configPins.uid?.id]?.value;
                const now = Date.now();

                // CHẶN TRÙNG LẶP: 
                // 1. UID hợp lệ
                // 2. Không đang trong quá trình xử lý (isProcessing)
                // 3. (Khác UID cũ) HOẶC (Cùng UID nhưng cách nhau trên 5 giây)
                if (uidVal && uidVal !== "0" && uidVal !== "" && uidVal !== "None") {
                    if (!isProcessing && (uidVal !== lastUidScan || (now - lastScanTime > 5000))) {
                        
                        isProcessing = true; // Khóa xử lý
                        lastUidScan = uidVal;
                        lastScanTime = now;

                        processAttendance({
                            uid: uidVal,
                            name: values[configPins.name?.id]?.value,
                            mssv: values[configPins.mssv?.id]?.value,
                            className: values[configPins.class?.id]?.value
                        });

                        // Mở khóa sau 2 giây để sẵn sàng cho lần quét tiếp theo
                        setTimeout(() => {
                            isProcessing = false;
                        }, 2000);
                    }
                }
            }
        });

        function getCurrentShift() {
            const now = new Date();
            const currentTotalMin = now.getHours() * 60 + now.getMinutes();
            return SHIFTS.find(s => {
                const [sH, sM] = s.start.split(':').map(Number);
                const [eH, eM] = s.end.split(':').map(Number);
                return currentTotalMin >= (sH * 60 + sM) && currentTotalMin <= (eH * 60 + eM);
            });
        }

        function updateShiftUI() {
            const shift = getCurrentShift();
            const badge = document.getElementById('ca-display-badge');
            const sDot = document.getElementById('session-status-dot');
            const sText = document.getElementById('session-status-text');
            const startT = document.getElementById('time-start');
            const endT = document.getElementById('time-end');

            if (shift) {
                badge.innerText = shift.name;
                startT.innerText = shift.start;
                endT.innerText = shift.end;
                if (shift.name === "CA NGHỈ") {
                    sDot.className = "w-2 h-2 rounded-full bg-orange-400";
                    sText.innerText = "ĐANG NGHỈ";
                } else {
                    sDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                    sText.innerText = "ĐANG DIỄN RA";
                }
            } else {
                badge.innerText = "OFF";
                sDot.className = "w-2 h-2 rounded-full bg-slate-300";
                sText.innerText = "NGOÀI GIỜ";
            }
        }

        function processAttendance(data) {
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            const shift = getCurrentShift();
            
            document.getElementById('display-name').innerText = data.name || "NGƯỜI LẠ";
            
            logs.unshift({
                time: timeStr,
                name: data.name || "Người lạ",
                mssv: data.mssv || "---",
                class: data.className || "---",
                shift: shift ? shift.name : "N/A"
            });
            updateUI();
        }

        function updateUI() {
            const body = document.getElementById('log-body');
            body.innerHTML = logs.map(l => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all">
                    <td class="py-5 text-[11px] font-bold text-slate-400 font-mono">${l.time}</td>
                    <td class="py-5 text-[14px] font-black text-slate-700 uppercase">${l.name}</td>
                    <td class="py-5 text-[13px] font-medium text-slate-500">${l.mssv}</td>
                    <td class="py-5 text-[13px] font-medium text-slate-500">${l.class}</td>
                    <td class="py-5"><span class="tag-status ${l.shift === 'CA NGHỈ' ? 'bg-orange-50 text-orange-500' : 'bg-blue-50 text-blue-500'}">${l.shift}</span></td>
                </tr>
            `).join('');
            
            document.getElementById('present-count').innerText = logs.length;
            document.getElementById('absent-count').innerText = Math.max(0, 40 - logs.length);
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(logs);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "Diem_Danh.xlsx");
        }

        function clearLogs() { if(confirm("Xóa hết dữ liệu?")) { logs.length = 0; updateUI(); } }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            updateShiftUI();
        }, 1000);
        updateShiftUI();
    </script>
</body>
</html>
