<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed layout-compact" dir="ltr" data-theme="theme-default">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>Hệ Thống Điểm Danh RFID Pro</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/fonts/boxicons.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/core.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/theme-default.css" />
  
  <style>
    body { background-color: #f4f7fa; font-family: 'Plus Jakarta Sans', sans-serif; }
    .container-main { max-width: 600px; margin: 40px auto; padding: 20px; }
    .header-section { margin-bottom: 30px; position: relative; }
    .header-title { font-weight: 800; font-size: 2.2rem; color: #1a202c; margin-bottom: 0; letter-spacing: -0.02em; }
    .status-cloud { position: absolute; right: 0; top: 15px; display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; }
    .dot-online { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; transition: all 0.3s; }
    .dot-online.active { background: #48bb78; box-shadow: 0 0 8px rgba(72, 187, 120, 0.6); }

    .scan-card {
        background: #ffffff;
        border-radius: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        padding: 60px 40px;
        text-align: center;
        margin-bottom: 25px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        transition: all 0.4s ease;
        position: relative;
    }
    .scan-card.active-success { border-color: #696cff; background: #f8f9ff; transform: translateY(-5px); }
    .scan-card.active-error { border-color: #ff3e1d; background: #fff5f4; transform: translateY(-5px); }

    .qr-placeholder { font-size: 5rem; color: #edf2f7; margin-bottom: 30px; display: block; }
    .instruction-text { font-weight: 800; font-size: 1.8rem; color: #4a5568; text-transform: uppercase; margin-bottom: 10px; }
    .sub-text { color: #a0aec0; font-size: 1.2rem; margin-bottom: 30px; font-weight: 500; }
    .uid-badge { background: #f1f5f9; color: #94a3b8; padding: 8px 20px; border-radius: 20px; font-family: monospace; font-size: 0.85rem; display: inline-block; }

    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .stat-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); display: flex; flex-direction: column; justify-content: center; }
    .stat-label { font-size: 0.6rem; font-weight: 800; color: #a0aec0; text-transform: uppercase; margin-bottom: 5px; }
    .stat-value { font-size: 2.2rem; font-weight: 800; color: #1a202c; line-height: 1; }

    .btn-action { background: white; border-radius: 25px; padding: 20px; border: none; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .btn-action:hover { transform: scale(1.05); }
    .btn-export { color: #696cff; }
    .btn-reset-full { color: #ff3e1d; }

    #authModal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 32, 44, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
    .modal-content-custom { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; }
  </style>
</head>

<body>
  <!-- Admin Verification Modal -->
  <div id="authModal">
    <div class="modal-content-custom text-center shadow-lg">
        <h4 class="fw-bold mb-1">Xác thực Admin</h4>
        <p class="text-muted mb-4 small">Nhập mã PIN để tiếp tục</p>
        <input type="password" id="adminPIN" class="form-control text-center fs-2 fw-bold mb-4" placeholder="••••" maxlength="4" style="letter-spacing: 10px; border-radius: 15px;">
        <div class="d-flex gap-2">
            <button onclick="closeAuth()" class="btn btn-label-secondary w-50">Hủy</button>
            <button onclick="verifyAdmin()" class="btn btn-primary w-50">Xác minh</button>
        </div>
    </div>
  </div>

  <div class="container-main">
    <div class="header-section">
        <h1 class="header-title">RFID Check-in</h1>
        <p class="header-subtitle m-0">Hệ thống điểm danh sinh viên</p>
        <div id="liveClock" style="font-size: 0.8rem; color: #a0aec0;">00:00:00 - 01/01/2024</div>
        <div class="status-cloud">
            <div id="era-dot" class="dot-online"></div>
            <span id="era-status-text">ĐANG KẾT NỐI...</span>
        </div>
    </div>

    <div id="statusBox" class="scan-card">
        <i id="statusIcon" class="bx bx-qr-scan qr-placeholder"></i>
        <h3 id="instruction" class="instruction-text">Sẵn sàng quét thẻ</h3>
        <div id="subText" class="sub-text">---</div>
        <div class="uid-badge" id="cardUIDDisplay">UID: ---</div>
    </div>

    <div class="action-row">
        <div class="stat-card">
            <span class="stat-label">Tổng lượt quét</span>
            <span id="statTotal" class="stat-value">0</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <button onclick="requestExport()" class="btn-action btn-export">
                <i class="bx bx-download"></i><span>Xuất file CSV</span>
            </button>
            <button id="btnResetHistory" class="btn-action btn-reset-full">
                <i class="bx bx-trash"></i><span>Xóa Lịch Sử</span>
            </button>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <small class="text-muted" style="font-size: 0.6rem; font-weight: 700; opacity: 0.5;">VERSION 4.3 - RESTORED ERA LIBRARY CONNECTION</small>
    </div>
  </div>

  <!-- THƯ VIỆN ERA QUAN TRỌNG NHẤT -->
  <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
  
  <script>
    const MASTER_PIN = "0909";
    const eraWidget = new EraWidget();
    
    let attendanceLogs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
    let configPins = { uid: null, name: null, mssv: null };
    let isBusy = false;
    let lastProcessedUID = "";
    let actionType = null;

    document.getElementById('statTotal').innerText = attendanceLogs.length;

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('vi-VN') + " - " + now.toLocaleDateString('vi-VN');
    }
    setInterval(updateClock, 1000);
    updateClock();

    function closeAuth() { document.getElementById('authModal').style.display = 'none'; document.getElementById('adminPIN').value = ""; }
    
    function verifyAdmin() {
        if (document.getElementById('adminPIN').value === MASTER_PIN) {
            closeAuth();
            if (actionType === 'reset') {
                attendanceLogs = []; 
                localStorage.setItem('attendanceLogs', "[]");
                document.getElementById('statTotal').innerText = "0";
            } else {
                performExport();
            }
        } else { alert("Mã PIN không chính xác!"); }
    }

    function requestExport() {
        if (attendanceLogs.length === 0) return alert("Không có dữ liệu!");
        actionType = 'export';
        document.getElementById('authModal').style.display = 'flex';
    }

    document.getElementById('btnResetHistory').onclick = () => {
        actionType = 'reset';
        document.getElementById('authModal').style.display = 'flex';
    };

    function processScanData(uid, name, mssv) {
        // Lọc giá trị rác hoặc trùng lặp nhanh
        if (!uid || uid === "0" || uid === "---" || uid === lastProcessedUID || isBusy) return;

        isBusy = true;
        lastProcessedUID = uid;
        const timeNow = new Date().toLocaleTimeString('vi-VN', {hour12: false});
        
        // Nhận diện người lạ
        let isStranger = (!name || name === "Nguoi la" || name === "---" || name === "Sinh vien moi" || name === "");
        const displayName = isStranger ? "Người lạ" : name;
        const displayMssv = isStranger ? "Chưa đăng ký" : mssv;

        // Cập nhật giao diện
        const box = document.getElementById('statusBox');
        const icon = document.getElementById('statusIcon');
        document.getElementById('cardUIDDisplay').innerText = "UID: " + uid;
        document.getElementById('instruction').innerText = displayName;
        document.getElementById('subText').innerText = displayMssv;

        if (!isStranger) {
            box.className = "scan-card active-success shadow-lg";
            icon.className = "bx bx-check-circle qr-placeholder text-primary";
        } else {
            box.className = "scan-card active-error shadow-lg";
            icon.className = "bx bx-error-circle qr-placeholder text-danger";
        }
        
        // Lưu log
        attendanceLogs.push({ uid, name: displayName, mssv: isStranger ? "N/A" : mssv, time: timeNow });
        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceLogs));
        document.getElementById('statTotal').innerText = attendanceLogs.length;

        // Trở về trạng thái chờ sau 3.5 giây
        setTimeout(() => {
            box.className = "scan-card";
            icon.className = "bx bx-qr-scan qr-placeholder";
            document.getElementById('instruction').innerText = "Sẵn sàng quét thẻ";
            document.getElementById('subText').innerText = "---";
            lastProcessedUID = ""; 
            isBusy = false;
        }, 3500);
    }

    // ERA WIDGET CORE LOGIC
    eraWidget.init({
      needRealtimeConfigs: true,
      onConfiguration: (configuration) => { 
          // Tìm ID của các chân Virtual Pin tương ứng (V0=0, V1=1, V2=2)
          configPins.uid = configuration.realtime_configs.find(c => c.pin === 0);
          configPins.name = configuration.realtime_configs.find(c => c.pin === 1);
          configPins.mssv = configuration.realtime_configs.find(c => c.pin === 2);
          
          if (configPins.uid) {
              document.getElementById('era-dot').classList.add('active');
              document.getElementById('era-status-text').innerText = "ERA ONLINE";
              document.getElementById('era-status-text').style.color = "#48bb78";
          }
      },
      onValues: (values) => {
          // Kiểm tra xem pin UID có dữ liệu mới không
          if (configPins.uid && values[configPins.uid.id]) {
              const currentUID = values[configPins.uid.id].value;
              const currentName = configPins.name && values[configPins.name.id] ? values[configPins.name.id].value : "---";
              const currentMssv = configPins.mssv && values[configPins.mssv.id] ? values[configPins.mssv.id].value : "---";
              
              if (currentUID) {
                  processScanData(currentUID, currentName, currentMssv);
              }
          }
      }
    });

    function performExport() {
        let csvContent = "\uFEFFSTT,Thời gian,Họ Tên,MSSV,UID Thẻ\n";
        attendanceLogs.forEach((item, index) => {
            csvContent += `${index + 1},${item.time},"${item.name}","${item.mssv}","${item.uid}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Diem_Danh_RFID_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.csv`;
        a.click();
    }
  </script>
</body>
</html>
