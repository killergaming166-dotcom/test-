<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Scanner - 5s Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); padding: 2.5rem; width: 100%; max-width: 480px; border: 1px solid rgba(226, 232, 240, 0.8); }
        
        #pinModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .timer-bar { position: absolute; bottom: 0; left: 0; height: 6px; background: rgba(0,0,0,0.1); width: 100%; overflow: hidden; border-radius: 0 0 48px 48px; display: none; }
        .timer-progress { height: 100%; background: currentColor; width: 100%; transform-origin: left; }
        @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    </style>
</head>
<body class="p-4">

    <!-- Modal PIN -->
    <div id="pinModal">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-xs text-center">
            <h3 class="text-xl font-black mb-6 text-slate-800 tracking-tight">NHẬP MÃ PIN</h3>
            <input type="password" id="inputPin" class="w-full text-center text-4xl font-black border-b-4 border-slate-100 focus:border-indigo-500 outline-none mb-8 pb-2 text-indigo-600" placeholder="••••" maxlength="4">
            <div class="flex gap-4">
                <button onclick="closePinModal()" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase tracking-widest">Hủy</button>
                <button onclick="verifyAndExport()" class="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-black transition-colors">Xác nhận</button>
            </div>
        </div>
    </div>

    <div class="card space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter">RFID SYSTEM</h1>
                <div class="flex items-center mt-1">
                    <span id="connectionDot" class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đang hoạt động</span>
                </div>
            </div>
            <div class="bg-indigo-50 px-4 py-2 rounded-2xl text-center min-w-[80px]">
                <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Lượt quét</p>
                <p id="totalCount" class="text-2xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <!-- Main Scan Area -->
        <div id="scanArea" class="relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50 transition-all duration-500">
            
            <!-- Status Icon -->
            <div id="statusIcon" class="mb-6 text-slate-200 transition-transform duration-500">
                <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>
            </div>
            
            <div class="text-center px-8 w-full z-10">
                <h2 id="displayName" class="text-3xl font-black text-slate-300 uppercase leading-tight tracking-tight break-words">Sẵn sàng</h2>
                <p id="displayMSSV" class="text-xl font-bold text-slate-400 mt-2 h-7"></p>
            </div>

            <div id="displayUID" class="absolute bottom-12 px-6 py-2 bg-white/80 border border-slate-100 rounded-full text-[11px] font-mono font-bold text-slate-400 tracking-wider">
                CHỜ QUÉT THẺ...
            </div>

            <!-- Timer Bar -->
            <div id="timerContainer" class="timer-bar">
                <div id="timerProgress" class="timer-progress"></div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-2">
            <button onclick="openPinModal()" class="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-black text-[11px] tracking-[0.2em] uppercase shadow-lg shadow-slate-200 active:scale-95 transition-all">
                XUẤT DỮ LIỆU
            </button>
            <button onclick="clearHistory()" class="px-6 bg-slate-100 text-slate-400 rounded-3xl font-black text-[11px] tracking-widest uppercase hover:bg-red-50 hover:text-red-500 transition-all">
                XÓA
            </button>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const MASTER_PIN = "0909";
        const DISPLAY_TIME = 5000; // 5 giây
        
        const eraWidget = new EraWidget();
        let logs = [];
        let configUID, configName, configMSSV;
        let lastScannedUID = null;
        let resetTimeout = null;

        eraWidget.init({
            needRealtimeConfigs: true,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                const uid = v[configUID?.id]?.value;
                const name = v[configName?.id]?.value || "NGƯỜI LẠ";
                const mssv = v[configMSSV?.id]?.value || "---";

                const isValidUID = (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "" && uid !== "Sẵn sàng");

                if (isValidUID) {
                    // Nếu là thẻ mới hoàn toàn
                    if (uid !== lastScannedUID) {
                        processNewScan(uid, name, mssv);
                    }
                }
            }
        });

        function processNewScan(uid, name, mssv) {
            // Xóa bộ hẹn giờ reset cũ nếu có (để đè thẻ mới lên)
            if (resetTimeout) clearTimeout(resetTimeout);
            
            lastScannedUID = uid;
            const isStranger = (name.toUpperCase().includes("NGUOI LA") || mssv === "---" || name === "NGƯỜI LẠ");
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            
            // Lưu log
            logs.unshift({ time: timeStr, name, mssv, uid, type: isStranger ? 'NGƯỜI LẠ' : 'SINH VIÊN' });
            document.getElementById('totalCount').innerText = logs.length;

            // Cập nhật UI hiển thị
            showStudentInfo(uid, name, mssv, isStranger);
            
            // Giọng nói
            speak(name, mssv, isStranger);

            // Hẹn giờ reset về trạng thái chờ sau 5 giây
            resetTimeout = setTimeout(() => {
                resetUI();
                lastScannedUID = null;
            }, DISPLAY_TIME);
        }

        function showStudentInfo(uid, name, mssv, isError) {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');
            const tc = document.getElementById('timerContainer');
            const tp = document.getElementById('timerProgress');

            dn.innerText = name.toUpperCase();
            dn.className = "text-3xl font-black text-slate-800 uppercase leading-tight tracking-tight";
            dm.innerText = mssv;
            du.innerText = `UID: ${uid}`;
            
            // Thanh đếm ngược 5 giây
            tc.style.display = 'block';
            tp.style.animation = 'none';
            tp.offsetHeight; // trigger reflow
            tp.style.animation = `shrink ${DISPLAY_TIME}ms linear forwards`;

            if (isError) {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-red-500 rounded-[48px] bg-red-50 shake transition-all duration-300";
                si.className = "mb-6 text-red-500 scale-110 transition-transform";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                tc.style.color = "#ef4444";
            } else {
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-emerald-500 rounded-[48px] bg-emerald-50 transition-all duration-300";
                si.className = "mb-6 text-emerald-500 scale-110 transition-transform";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                tc.style.color = "#10b981";
            }
        }

        function resetUI() {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');
            const tc = document.getElementById('timerContainer');

            dn.innerText = "Sẵn sàng";
            dn.className = "text-3xl font-black text-slate-300 uppercase leading-tight tracking-tight";
            dm.innerText = "";
            du.innerText = "CHỜ QUÉT THẺ...";
            tc.style.display = 'none';
            
            sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50 transition-all duration-500";
            si.className = "mb-6 text-slate-200 scale-100 transition-transform";
            si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>`;
        }

        function speak(name, mssv, isStranger) {
            window.speechSynthesis.cancel();
            const text = isStranger ? `Thẻ lạ` : `${name}. Mã số ${mssv.split('').join(' ')}`;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'vi-VN';
            window.speechSynthesis.speak(utter);
        }

        function clearHistory() {
            if (confirm("Xóa toàn bộ lịch sử quét?")) {
                logs = [];
                document.getElementById('totalCount').innerText = "0";
                resetUI();
            }
        }

        function openPinModal() {
            if (logs.length === 0) return;
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('inputPin').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('inputPin').value = "";
        }

        function verifyAndExport() {
            if (document.getElementById('inputPin').value === MASTER_PIN) {
                closePinModal();
                let csv = "\uFEFFGiờ,Họ Tên,Mã Số,UID,Loại\n";
                [...logs].reverse().forEach(l => csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}",${l.type}\n`);
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                link.download = `Checkin_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
                link.click();
            } else {
                document.getElementById('inputPin').value = "";
                document.querySelector('#pinModal div').classList.add('shake');
                setTimeout(() => document.querySelector('#pinModal div').classList.remove('shake'), 500);
            }
        }
    </script>
</body>
</html>
