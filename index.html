<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed layout-compact" dir="ltr" data-theme="theme-default">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>Hệ Thống Điểm Danh RFID Pro</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/fonts/boxicons.css" />
  
  <!-- Core CSS -->
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/core.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/theme-default.css" />
  
  <style>
    body { background-color: #f4f7fa; font-family: 'Plus Jakarta Sans', sans-serif; }
    .container-main { max-width: 600px; margin: 40px auto; padding: 20px; }
    
    .header-section { margin-bottom: 30px; position: relative; }
    .header-title { font-weight: 800; font-size: 2.2rem; color: #1a202c; margin-bottom: 0; letter-spacing: -0.02em; }
    .header-subtitle { color: #718096; font-size: 1rem; margin-top: 5px; }
    .status-cloud { position: absolute; right: 0; top: 15px; display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; }
    .dot-online { width: 8px; height: 8px; background: #48bb78; border-radius: 50%; box-shadow: 0 0 8px rgba(72, 187, 120, 0.6); }

    .scan-card {
        background: #ffffff;
        border-radius: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        padding: 60px 40px;
        text-align: center;
        margin-bottom: 25px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        transition: all 0.4s ease;
        position: relative;
    }
    .scan-card.active-success { border-color: #696cff; background: #f8f9ff; transform: translateY(-5px); }
    .scan-card.active-error { border-color: #ff3e1d; background: #fff5f4; transform: translateY(-5px); }

    .qr-placeholder { font-size: 5rem; color: #edf2f7; margin-bottom: 30px; display: block; }
    .instruction-text { font-weight: 800; font-size: 1.8rem; color: #4a5568; text-transform: uppercase; margin-bottom: 10px; letter-spacing: -0.01em; }
    .sub-text { color: #a0aec0; font-size: 1.2rem; margin-bottom: 30px; font-weight: 500; }
    .uid-badge { background: #f1f5f9; color: #94a3b8; padding: 8px 20px; border-radius: 20px; font-family: monospace; font-size: 0.85rem; display: inline-block; }

    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    .stat-card {
        background: white;
        border-radius: 25px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
    }
    .stat-label { font-size: 0.6rem; font-weight: 800; color: #a0aec0; text-transform: uppercase; margin-bottom: 5px; }
    .stat-value { font-size: 2.2rem; font-weight: 800; color: #1a202c; line-height: 1; }

    .btn-action {
        background: white;
        border-radius: 25px;
        padding: 20px;
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-action:hover { transform: scale(1.05); }
    .btn-action i { font-size: 1.4rem; margin-bottom: 5px; }
    .btn-action span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

    .btn-export { color: #696cff; }
    .btn-export:hover { background: #f8f9ff; }

    .btn-reset-full { color: #ff3e1d; }
    .btn-reset-full:hover { background: #fff5f4; }

    #authModal {
        display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(26, 32, 44, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center;
    }
    .modal-content-custom { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid #e2e8f0; }
    .digital-clock { font-size: 0.75rem; color: #a0aec0; font-weight: 600; margin-top: 5px; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>

<body>

  <!-- Modal PIN -->
  <div id="authModal">
    <div class="modal-content-custom text-center shadow-lg">
        <h4 class="fw-bold mb-1">Xác thực Admin</h4>
        <p class="text-muted mb-4 small" id="authTitle">Nhập mã PIN để tiếp tục</p>
        <input type="password" id="adminPIN" class="form-control text-center fs-2 fw-bold mb-4" placeholder="••••" maxlength="4" style="letter-spacing: 10px; border-radius: 15px;">
        <div class="d-flex gap-2">
            <button onclick="closeAuth()" class="btn btn-label-secondary w-50" style="border-radius: 12px;">Hủy</button>
            <button onclick="verifyAdmin()" class="btn btn-primary w-50" style="border-radius: 12px;">Xác minh</button>
        </div>
    </div>
  </div>

  <div class="container-main">
    <div class="header-section">
        <h1 class="header-title">RFID Check-in</h1>
        <p class="header-subtitle m-0">Hệ thống điểm danh sinh viên</p>
        <div id="liveClock" class="digital-clock">00:00:00 - 01/01/2024</div>
        <div class="status-cloud">
            <div class="dot-online"></div>
            KẾT NỐI ERA
        </div>
    </div>

    <div id="statusBox" class="scan-card">
        <i id="statusIcon" class="bx bx-qr-scan qr-placeholder"></i>
        <h3 id="instruction" class="instruction-text">Sẵn sàng quét thẻ</h3>
        <div id="subText" class="sub-text">---</div>
        <div class="uid-badge" id="cardUIDDisplay">UID: ---</div>
    </div>

    <div class="action-row">
        <div class="stat-card">
            <span class="stat-label">Tổng lượt quét</span>
            <span id="statTotal" class="stat-value">0</span>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <button onclick="requestExport()" class="btn-action btn-export" style="flex: 1; width: 100%;">
                <i class="bx bx-download"></i>
                <span>Xuất file CSV</span>
            </button>

            <button id="btnResetHistory" class="btn-action btn-reset-full" style="flex: 1; width: 100%;">
                <i class="bx bx-trash"></i>
                <span>Xóa Lịch Sử</span>
            </button>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <small class="text-muted" style="font-size: 0.6rem; letter-spacing: 0.1em; font-weight: 700; opacity: 0.5;">VERSION 4.0 - DATA SYNC FIXED</small>
    </div>
  </div>

  <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
  <script>
    const MASTER_PIN = "0909";
    const eraWidget = new EraWidget();
    
    let attendanceLogs = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
    let scanCount = parseInt(localStorage.getItem('scanCount')) || 0;
    
    let configs = { packet: null };
    let isInitialLoad = true;
    let isProcessing = false;
    let lastProcessedPacket = "";
    let lastTime = 0;
    const COOLDOWN_TIME = 4000; 

    document.getElementById('statTotal').innerText = scanCount;

    function saveData() {
        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceLogs));
        localStorage.setItem('scanCount', scanCount.toString());
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString('vi-VN') + " - " + now.toLocaleDateString('vi-VN');
    }
    setInterval(updateClock, 1000);
    updateClock();

    function closeAuth() { document.getElementById('authModal').style.display = 'none'; document.getElementById('adminPIN').value = ""; }
    
    let pendingAction = '';

    function verifyAdmin() {
        if (document.getElementById('adminPIN').value === MASTER_PIN) {
            closeAuth();
            if (pendingAction === 'export') performExport();
            else if (pendingAction === 'reset') performReset();
        } else { 
            alert("Mã PIN không đúng!"); 
        }
    }

    function performReset() {
        scanCount = 0; attendanceLogs = []; saveData();
        document.getElementById('statTotal').innerText = "0";
        alert("Đã xóa sạch lịch sử!");
    }

    function requestExport() {
        if (attendanceLogs.length === 0) return alert("Không có dữ liệu!");
        pendingAction = 'export';
        document.getElementById('authTitle').innerText = "Xác nhận để tải file";
        document.getElementById('authModal').style.display = 'flex';
    }

    function performExport() {
        let csvContent = "\uFEFFSTT,Giờ,Họ Tên,MSSV,UID\n";
        attendanceLogs.forEach((log, i) => {
            csvContent += `${i+1},${log.time},"${log.name}","${log.mssv}","'${log.uid}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RFID_Log_Attendance.csv`;
        link.click();
    }

    function handleScanPacket(packet) {
        if (!packet || packet === "---" || packet === "0" || packet === "") return;

        if (isInitialLoad) {
            isInitialLoad = false;
            lastProcessedPacket = packet;
            return;
        }

        const now = Date.now();
        if (isProcessing || (packet === lastProcessedPacket && (now - lastTime < COOLDOWN_TIME))) {
            return;
        }

        const parts = packet.split('|');
        if (parts.length < 3) return;

        const uid = parts[0];
        const name = parts[1];
        const mssv = parts[2];

        isProcessing = true;
        lastProcessedPacket = packet;
        lastTime = now;

        const timeStr = new Date().toLocaleTimeString('vi-VN', {hour12: false});
        let isStranger = (name.toUpperCase().includes("NGUOI LA") || name.toUpperCase().includes("MOI") || name === "---");

        updateUI(isStranger ? 'error' : 'success', name, mssv, uid);
        
        scanCount++;
        document.getElementById('statTotal').innerText = scanCount;
        attendanceLogs.push({ uid, name, mssv, time: timeStr });
        saveData();
    }

    function updateUI(state, title, sub, uid) {
        const box = document.getElementById('statusBox');
        const icon = document.getElementById('statusIcon');
        const instr = document.getElementById('instruction');
        const subT = document.getElementById('subText');
        const uidD = document.getElementById('cardUIDDisplay');

        uidD.innerText = "UID: " + uid;
        instr.innerText = title;
        subT.innerText = sub;

        if (state === 'success') {
            box.className = "scan-card active-success shadow-lg";
            icon.className = "bx bx-check-circle qr-placeholder text-primary";
            instr.style.color = "#696cff";
        } else {
            box.className = "scan-card active-error shadow-lg shake";
            icon.className = "bx bx-error-circle qr-placeholder text-danger";
            instr.style.color = "#ff3e1d";
        }

        setTimeout(() => {
            box.className = "scan-card";
            icon.className = "bx bx-qr-scan qr-placeholder";
            icon.style.color = "";
            instr.innerText = "Sẵn sàng quét thẻ";
            instr.style.color = "";
            subT.innerText = "---";
            isProcessing = false;
        }, 3500);
    }

    eraWidget.init({
      needRealtimeConfigs: true,
      onConfiguration: (c) => {
          configs.packet = c.realtime_configs[0];
      },
      onValues: (v) => {
        const p = configs.packet ? v[configs.packet.id]?.value : "";
        handleScanPacket(p);
      }
    });

    document.getElementById('btnResetHistory').onclick = () => {
        pendingAction = 'reset';
        document.getElementById('authTitle').innerText = "Xác nhận xóa sạch lịch sử";
        document.getElementById('authModal').style.display = 'flex';
    };
  </script>
</body>
</html>
