<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Điểm Danh - Era</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #334155;
            padding: 2rem;
        }

        /* Card styles */
        .card-base {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
            border: 1px solid #f1f5f9;
        }

        /* Stat Cards với thanh màu bên trái */
        .stat-card {
            padding: 1.5rem 2rem;
            position: relative;
            background: #ffffff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f1f5f9;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            border-radius: 0 10px 10px 0;
        }
        .stat-total::before { background-color: #cbd5e1; }
        .stat-present::before { background-color: #10b981; }
        .stat-absent::before { background-color: #f43f5e; }

        .stat-icon-container {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
        }

        /* Avatar Placeholder tròn */
        .avatar-placeholder {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            color: #cbd5e1;
        }

        /* Input Styles */
        .input-group label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }
        .custom-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            width: 100%;
            font-size: 13px;
        }

        /* Nút màu cam chuẩn */
        .btn-register {
            background: linear-gradient(135deg, #ff9048 0%, #ff7d29 100%);
            color: white;
            font-weight: 800;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 4px 12px rgba(255, 125, 41, 0.2);
            width: 100%;
        }

        /* Clock style */
        .digital-clock {
            font-size: 4rem;
            font-weight: 900;
            color: #1e293b;
            letter-spacing: -2px;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white shadow-sm border border-slate-100 rounded-lg flex items-center justify-center font-black text-[#ff7d29]">F</div>
            <div>
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">DASHBOARD</h1>
                <div class="flex items-center gap-2">
                    <span id="era-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span id="era-status" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic">CONNECTING TO ERA...</span>
                </div>
            </div>
        </div>
        <div class="digital-clock" id="clock">00:00:00</div>
    </div>

    <div class="grid grid-cols-12 gap-6">
        
        <!-- Left Section (Scanning & Registration) -->
        <div class="col-span-8 space-y-6">
            
            <!-- Main Display Area -->
            <div class="card-base p-12 flex flex-col items-center justify-center relative min-h-[450px]">
                <div class="absolute top-6 left-8 bg-slate-50 border border-slate-100 px-4 py-1 rounded-full flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">OFFLINE</span>
                </div>
                <div class="absolute top-6 right-8 bg-[#0f172a] text-white text-[10px] font-bold px-3 py-1 rounded-lg">CA --</div>

                <div class="avatar-placeholder mb-8">
                    <i class="fa-solid fa-user text-7xl"></i>
                </div>

                <div class="text-center">
                    <div class="flex justify-center gap-2 mb-4">
                        <div class="w-8 h-1.5 bg-[#1e293b] rounded-full"></div>
                        <div class="w-8 h-1.5 bg-[#1e293b] rounded-full"></div>
                        <div class="w-8 h-1.5 bg-[#1e293b] rounded-full"></div>
                    </div>
                    <h2 id="display-name" class="text-2xl font-black text-slate-800 uppercase tracking-widest mb-2">ĐANG ĐỢI THẺ...</h2>
                    <div class="flex items-center justify-center gap-2 text-blue-500 font-bold text-[11px] uppercase tracking-widest">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> SẴN SÀNG
                    </div>
                </div>
            </div>

            <!-- Registration Area -->
            <div class="card-base p-6 border-l-8 border-[#ff7d29]">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-[#ff7d29]">
                        <i class="fa-solid fa-id-card-clip"></i>
                    </div>
                    <h3 class="font-extrabold text-slate-800 text-[12px] uppercase">ĐĂNG KÝ THẺ THÀNH VIÊN</h3>
                </div>
                <div class="grid grid-cols-5 gap-4 items-end">
                    <div class="input-group">
                        <label>MÃ UID</label>
                        <input type="text" id="reg-uid" placeholder="UID..." class="custom-input">
                    </div>
                    <div class="input-group">
                        <label>HỌ VÀ TÊN</label>
                        <input type="text" id="reg-name" placeholder="Tên SV..." class="custom-input">
                    </div>
                    <div class="input-group">
                        <label>MSSV / ID</label>
                        <input type="text" id="reg-mssv" placeholder="MSSV..." class="custom-input">
                    </div>
                    <div class="input-group">
                        <label>LỚP / BỘ PHẬN</label>
                        <input type="text" id="reg-class" placeholder="Lớp..." class="custom-input">
                    </div>
                    <div>
                        <button class="btn-register" onclick="alert('Đã gửi yêu cầu đăng ký!')">XÁC NHẬN ĐK</button>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="card-base overflow-hidden">
                <div class="p-6 flex justify-between items-center">
                    <h3 class="font-extrabold text-slate-800">Lịch sử điểm danh</h3>
                    <div class="flex gap-2">
                        <button class="bg-[#10b981] text-white text-[10px] font-bold py-2 px-4 rounded-xl uppercase flex items-center gap-2">
                            <i class="fa-solid fa-file-excel"></i> XUẤT EXCEL
                        </button>
                        <button onclick="clearLogs()" class="bg-rose-50 text-rose-500 text-[10px] font-bold py-2 px-4 rounded-xl uppercase border border-rose-100">XÓA DỮ LIỆU</button>
                    </div>
                </div>
                <div class="px-6 pb-6">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-50">
                                <th class="pb-4">THỜI GIAN</th>
                                <th class="pb-4">SINH VIÊN</th>
                                <th class="pb-4">MSSV</th>
                                <th class="pb-4">LỚP</th>
                                <th class="pb-4">TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="log-body">
                            <!-- Logs injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right Section (Stats) -->
        <div class="col-span-4 space-y-6">
            
            <div class="stat-card stat-total">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">SĨ SỐ LỚP</p>
                    <h4 class="text-5xl font-black text-slate-800" id="total-students">40</h4>
                </div>
                <div class="stat-icon-container">
                    <i class="fa-solid fa-users text-slate-300"></i>
                </div>
            </div>

            <div class="stat-card stat-present">
                <div>
                    <p class="text-[10px] font-bold text-emerald-500 uppercase mb-1">HIỆN DIỆN</p>
                    <h4 class="text-5xl font-black text-slate-800" id="present-count">0</h4>
                </div>
                <div class="stat-icon-container bg-emerald-50">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i>
                </div>
            </div>

            <div class="stat-card stat-absent">
                <div>
                    <p class="text-[10px] font-bold text-rose-500 uppercase mb-1">VẮNG MẶT</p>
                    <h4 class="text-5xl font-black text-rose-500" id="absent-count">40</h4>
                </div>
                <div class="stat-icon-container bg-rose-50">
                    <i class="fa-solid fa-circle-xmark text-rose-500"></i>
                </div>
            </div>

            <!-- Timeline -->
            <div class="card-base p-8">
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-1 h-5 bg-blue-600 rounded-full"></div>
                    <h3 class="font-extrabold text-slate-800 uppercase text-[12px]">THỜI GIAN BIỂU</h3>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                        <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">BẮT ĐẦU</p>
                        <p class="text-2xl font-black text-slate-700">--:--</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                        <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">KẾT THÚC</p>
                        <p class="text-2xl font-black text-slate-700">--:--</p>
                    </div>
                </div>

                <div class="bg-emerald-50 border border-emerald-100 p-3 rounded-xl flex justify-between items-center mb-4">
                    <span class="text-[9px] font-black text-emerald-600 uppercase">ESP32: ONLINE</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                </div>

                <button class="w-full bg-[#0f172a] text-white font-bold py-4 rounded-xl uppercase text-[10px] tracking-widest shadow-lg shadow-slate-200">
                    KẾT NỐI THỦ CÔNG
                </button>
            </div>
        </div>
    </div>

    <script>
        const eraWidget = new EraWidget();
        let configPins = { uid: null, name: null, mssv: null, class: null };
        const logs = [];

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 4,
            onConfiguration: (config) => {
                configPins.uid = config.realtime_configs[0];
                configPins.name = config.realtime_configs[1];
                configPins.mssv = config.realtime_configs[2];
                configPins.class = config.realtime_configs[3];
                
                document.getElementById('era-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('era-status').innerText = "ONLINE";
            },
            onValues: (values) => {
                const uid = values[configPins.uid?.id]?.value;
                const name = values[configPins.name?.id]?.value;
                const mssv = values[configPins.mssv?.id]?.value;
                const className = values[configPins.class?.id]?.value;

                if (uid && uid !== "0" && uid !== "") {
                    processAttendance({ uid, name, mssv, className });
                }
            }
        });

        function processAttendance(data) {
            document.getElementById('display-name').innerText = data.name || "CHƯA ĐĂNG KÝ";
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', { hour12: false });
            
            logs.unshift({
                time: timeStr,
                name: data.name || "N/A",
                mssv: data.mssv || "---",
                class: data.className || "---"
            });

            updateUI();
        }

        function updateUI() {
            const body = document.getElementById('log-body');
            body.innerHTML = logs.map(l => `
                <tr class="border-b border-slate-50 last:border-0">
                    <td class="py-4 text-[11px] font-bold text-slate-400 font-mono">${l.time}</td>
                    <td class="py-4 text-[13px] font-black text-slate-700 uppercase">${l.name}</td>
                    <td class="py-4 text-[13px] font-medium text-slate-500">${l.mssv}</td>
                    <td class="py-4 text-[13px] font-medium text-slate-500">${l.class}</td>
                    <td class="py-4">
                        <span class="bg-emerald-50 text-emerald-600 text-[9px] font-black px-3 py-1 rounded-full uppercase">Thành công</span>
                    </td>
                </tr>
            `).join('');

            const present = logs.length;
            document.getElementById('present-count').innerText = present;
            document.getElementById('absent-count').innerText = Math.max(0, 40 - present);
        }

        function clearLogs() {
            logs.length = 0;
            updateUI();
            document.getElementById('display-name').innerText = "ĐANG ĐỢI THẺ...";
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
