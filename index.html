<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-radius: 2rem;
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            margin: 1rem;
        }
        .info-box {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .info-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: white;
            padding: 0 10px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
        }
        .info-value {
            width: 100%;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.25rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            min-height: 70px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-value {
            border-color: #10b981;
            background-color: #f0fdf4;
            color: #065f46;
            transform: scale(1.02);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic text-blue-600 uppercase tracking-tighter">Hệ Thống RFID</h1>
            <div id="connection-status" class="mt-2 status-badge bg-slate-100 text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-400 mr-2"></span>
                Đang kết nối Cloud...
            </div>
        </div>

        <!-- Tên sinh viên -->
        <div class="info-box">
            <span class="info-label">Tên sinh viên</span>
            <div id="name" class="info-value">---</div>
        </div>

        <!-- MSSV -->
        <div class="info-box">
            <span class="info-label">Mã số sinh viên</span>
            <div id="mssv" class="info-value">---</div>
        </div>

        <!-- UID Thẻ -->
        <div class="info-box">
            <span class="info-label">ID Chip RFID</span>
            <div id="uid" class="info-value font-mono text-base text-slate-400">---</div>
        </div>

        <!-- Thông báo quẹt thẻ -->
        <div class="mt-8 text-center">
            <div id="status-icon" class="flex justify-center mb-2 text-slate-200">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
            </div>
            <p id="status-msg" class="text-sm font-bold text-slate-400 uppercase tracking-widest pulse">Vui lòng quẹt thẻ</p>
        </div>
    </div>

    <script>
        const TOKEN = "53f7b5a4-c19e-4760-9940-ff280ac07374";
        const ERA_API = `https://vn.e-ra.io/v1/devices/data?token=${TOKEN}`;
        // Proxy để vượt lỗi CORS
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function fetchData() {
            try {
                const response = await fetch(`${PROXY}${encodeURIComponent(ERA_API + '&_t=' + Date.now())}`);
                if (!response.ok) throw new Error("Network error");
                
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    const v0 = data.find(i => i.pin === 0)?.value || "---"; // UID
                    const v1 = data.find(i => i.pin === 1)?.value || "---"; // Name
                    const v2 = data.find(i => i.pin === 2)?.value || "---"; // MSSV

                    updateDisplay(v0, v1, v2);
                    setConnectionState(true);
                }
            } catch (error) {
                console.error("Lỗi:", error);
                setConnectionState(false);
            }
        }

        function setConnectionState(online) {
            const badge = document.getElementById('connection-status');
            if (online) {
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span> Cloud Online';
                badge.className = "mt-2 status-badge bg-emerald-50 text-emerald-600";
            } else {
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500 mr-2 animate-ping"></span> Mất kết nối';
                badge.className = "mt-2 status-badge bg-red-50 text-red-600";
            }
        }

        function updateDisplay(v0, v1, v2) {
            const nameEl = document.getElementById('name');
            const mssvEl = document.getElementById('mssv');
            const uidEl = document.getElementById('uid');
            const msgEl = document.getElementById('status-msg');
            const iconEl = document.getElementById('status-icon');

            nameEl.innerText = v1;
            mssvEl.innerText = v2;
            uidEl.innerText = v0;

            // Kiểm tra trạng thái đã quẹt thẻ chưa (dựa trên việc V1 có tên hay không)
            const hasData = v1 !== "---" && v1 !== "" && v1 !== "Sẵn sàng" && v1 !== "Waiting...";

            if (hasData) {
                nameEl.classList.add('active-value');
                mssvEl.classList.add('active-value');
                msgEl.innerText = "Điểm danh thành công!";
                msgEl.className = "text-sm font-bold text-emerald-600 uppercase tracking-widest";
                msgEl.classList.remove('pulse');
                iconEl.className = "flex justify-center mb-2 text-emerald-500 scale-110 transition-transform";
                iconEl.innerHTML = '<svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            } else {
                nameEl.classList.remove('active-value');
                mssvEl.classList.remove('active-value');
                msgEl.innerText = "Vui lòng quẹt thẻ";
                msgEl.className = "text-sm font-bold text-slate-400 uppercase tracking-widest pulse";
                iconEl.className = "flex justify-center mb-2 text-slate-200";
                iconEl.innerHTML = '<svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>';
            }
        }

        // Cập nhật mỗi 1.5 giây để đảm bảo tính thời gian thực
        setInterval(fetchData, 1500);
        fetchData();
    </script>
</body>
</html>
