<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Điểm Danh RFID - Anti-Spam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .card { background: white; border-radius: 32px; box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1); padding: 2.5rem; border: 1px solid rgba(255,255,255,0.8); }
        
        #pinModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; }
        
        /* Hiệu ứng rung khi gặp thẻ lạ (người lạ) */
        .shake { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* Vòng tròn tiến trình quẹt thẻ (2s) */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Lớp phủ khi đang trong thời gian nghỉ (8s) */
        .cooldown-overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            border-radius: 48px;
        }

        .status-icon-container {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="p-4">

    <!-- Modal xác thực để xuất file CSV -->
    <div id="pinModal">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-sm text-center border border-slate-100">
            <h3 class="text-2xl font-black mb-2 text-slate-800 uppercase tracking-tight text-indigo-600">Xác thực quyền</h3>
            <p class="text-xs text-slate-400 mb-8 font-bold uppercase tracking-widest">Nhập mã PIN quản trị</p>
            <input type="password" id="inputPin" class="w-full text-center text-4xl tracking-[1rem] font-black border-b-4 border-slate-200 focus:border-indigo-500 outline-none mb-10 pb-4 transition-all" placeholder="••••" maxlength="4">
            <div class="flex gap-4">
                <button onclick="closePinModal()" class="flex-1 py-4 text-slate-400 font-bold hover:text-slate-600 transition-colors uppercase text-sm">Hủy</button>
                <button onclick="verifyAndExport()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all uppercase text-sm">Xác nhận</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl w-full space-y-6">
        <!-- Phần tiêu đề và thống kê -->
        <div class="flex justify-between items-end px-4">
            <div>
                <span id="statusBadge" class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 text-green-600 uppercase tracking-widest mb-2">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-2 animate-pulse"></span> Hệ thống Trực tuyến
                </span>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">RFID SCANNER</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tổng lượt quét</p>
                <p id="totalCount" class="text-4xl font-black text-indigo-600 tabular-nums">0</p>
            </div>
        </div>

        <div class="card relative overflow-hidden">
            <!-- Khu vực quét chính -->
            <div id="scanArea" class="relative min-h-[500px] flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] transition-all duration-500 bg-slate-50/50">
                
                <!-- Lớp phủ Cooldown -->
                <div id="cooldownLayer" class="cooldown-overlay absolute inset-0 z-20 flex flex-col items-center justify-center text-center">
                    <div id="cooldownTimer" class="text-8xl font-black text-slate-800 mb-2">8</div>
                    <p class="text-slate-400 font-bold uppercase tracking-[0.3em] text-[10px]">Đang reset cảm biến...</p>
                </div>

                <!-- Vòng tròn tiến trình (hiện khi giữ thẻ) -->
                <div id="progressContainer" class="absolute hidden">
                    <svg width="280" height="280">
                        <circle class="progress-ring__circle" stroke="#6366f1" stroke-width="8" fill="transparent" r="130" cx="140" cy="140" stroke-dasharray="816.8" stroke-dashoffset="816.8"/>
                    </svg>
                </div>

                <!-- Biểu tượng Trạng thái (Thay đổi theo kết quả) -->
                <div id="statusIcon" class="status-icon-container mb-12 text-slate-200">
                    <svg class="w-32 h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path id="iconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                    </svg>
                </div>
                
                <div class="text-center space-y-3 z-10 px-6">
                    <h2 id="displayName" class="text-4xl font-black text-slate-300 uppercase tracking-tight transition-all duration-500">Sẵn sàng</h2>
                    <p id="displayMSSV" class="text-xl font-bold text-slate-400 tracking-[0.2em] h-7 uppercase"></p>
                </div>

                <div id="displayUID" class="mt-12 px-8 py-3 bg-white border border-slate-100 rounded-full text-xs font-mono font-bold text-slate-400 shadow-sm transition-colors">
                    ĐỂ THẺ VÀO VÙNG QUÉT
                </div>

                <div id="holdLabel" class="mt-4 text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em] opacity-0 transition-opacity">
                    Giữ thẻ trong 2 giây để xác nhận
                </div>
            </div>

            <!-- Nút chức năng -->
            <div class="grid grid-cols-2 gap-4 mt-10">
                <button onclick="openPinModal()" class="py-5 bg-indigo-600 text-white rounded-3xl font-black text-xs tracking-widest flex items-center justify-center gap-3 shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Xuất Báo Cáo
                </button>
                <button onclick="location.reload()" class="bg-slate-50 text-slate-400 py-5 rounded-3xl font-black text-xs tracking-widest hover:bg-slate-100 transition-all uppercase">
                    Làm mới phiên
                </button>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.5em] pt-4">ERA SECURITY INTERFACE v2.0</p>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const MASTER_PIN = "0909";
        const HOLD_TIME_REQUIRED = 2000; 
        const COOLDOWN_TIME = 8000;      
        
        const eraWidget = new EraWidget();
        let logs = [];
        let configUID, configName, configMSSV;
        
        let isProcessing = false;
        let isHolding = false;
        let holdStartTime = 0;
        let holdTimer = null;
        let currentUID = null;
        let currentName = null;
        let currentMSSV = null;

        // Cấu hình vòng tròn tiến trình
        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                if (isProcessing) return;

                const uid = v[configUID?.id]?.value;
                const name = v[configName?.id]?.value || "NGUOI LA";
                const mssv = v[configMSSV?.id]?.value || "---";

                const isValidUID = (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "Sẵn sàng");

                if (isValidUID) {
                    if (!isHolding || currentUID !== uid) {
                        startHolding(uid, name, mssv);
                    }
                } else {
                    if (isHolding) cancelHolding();
                }
            }
        });

        function startHolding(uid, name, mssv) {
            isHolding = true;
            currentUID = uid;
            currentName = name;
            currentMSSV = mssv;
            holdStartTime = Date.now();
            
            document.getElementById('holdLabel').classList.remove('opacity-0');
            document.getElementById('progressContainer').classList.remove('hidden');
            
            if (holdTimer) clearInterval(holdTimer);
            holdTimer = setInterval(() => {
                const elapsed = Date.now() - holdStartTime;
                const progress = Math.min(elapsed / HOLD_TIME_REQUIRED, 1);
                const offset = circumference - (progress * circumference);
                circle.style.strokeDashoffset = offset;

                if (elapsed >= HOLD_TIME_REQUIRED) {
                    clearInterval(holdTimer);
                    executeScan();
                }
            }, 50);
        }

        function cancelHolding() {
            isHolding = false;
            currentUID = null;
            clearInterval(holdTimer);
            document.getElementById('holdLabel').classList.add('opacity-0');
            document.getElementById('progressContainer').classList.add('hidden');
            circle.style.strokeDashoffset = circumference;
        }

        function executeScan() {
            isProcessing = true;
            isHolding = false;
            
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            
            // Nhận diện người lạ: Nếu tên chứa "NGUOI LA", "THE LA" hoặc MSSV là "---"
            const nameUp = currentName.toUpperCase();
            const isStranger = (nameUp.includes("NGUOI LA") || nameUp.includes("THE LA") || currentMSSV === "---");

            updateUI(currentUID, currentName, currentMSSV, isStranger);
            logs.unshift({ time: timeStr, name: currentName, mssv: currentMSSV, uid: currentUID, type: isStranger ? 'NGƯỜI LẠ' : 'SINH VIÊN' });
            
            document.getElementById('totalCount').innerText = logs.length;
            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('holdLabel').classList.add('opacity-0');

            startCooldown();
        }

        function updateUI(uid, name, mssv, isError) {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = name.toUpperCase();
            dm.innerText = mssv;
            du.innerText = `ID: ${uid}`;

            if (isError) {
                // TRẠNG THÁI NGƯỜI LẠ: VIỀN ĐỎ + ICON X + RUNG (SHAKE)
                dn.className = "text-4xl font-black text-red-600 uppercase tracking-tight scale-105 transition-all";
                sa.className = "relative min-h-[500px] flex flex-col items-center justify-center border-4 border-solid border-red-500 rounded-[48px] bg-red-50/50 shake";
                si.className = "status-icon-container mb-12 text-red-600 scale-125";
                si.innerHTML = `
                    <svg class="w-32 h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>`;
                du.className = "mt-12 px-8 py-3 bg-white border border-red-200 rounded-full text-xs font-mono font-bold text-red-500 shadow-sm";
            } else {
                // TRẠNG THÁI HỢP LỆ: VIỀN XANH + ICON CHECK
                dn.className = "text-4xl font-black text-emerald-600 uppercase tracking-tight scale-105 transition-all";
                sa.className = "relative min-h-[500px] flex flex-col items-center justify-center border-4 border-solid border-emerald-500 rounded-[48px] bg-emerald-50/50 transition-all";
                si.className = "status-icon-container mb-12 text-emerald-600 scale-125";
                si.innerHTML = `
                    <svg class="w-32 h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>`;
                du.className = "mt-12 px-8 py-3 bg-white border border-emerald-200 rounded-full text-xs font-mono font-bold text-emerald-600 shadow-sm";
            }
        }

        function startCooldown() {
            const overlay = document.getElementById('cooldownLayer');
            const timerText = document.getElementById('cooldownTimer');
            overlay.style.display = 'flex';
            
            let timeLeft = Math.floor(COOLDOWN_TIME / 1000);
            timerText.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    resetScanner();
                }
            }, 1000);
        }

        function resetScanner() {
            isProcessing = false;
            document.getElementById('cooldownLayer').style.display = 'none';
            
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = "Sẵn sàng";
            dn.className = "text-4xl font-black text-slate-300 uppercase tracking-tight";
            dm.innerText = "";
            du.innerText = "ĐỂ THẺ VÀO VÙNG QUÉT";
            du.className = "mt-12 px-8 py-3 bg-white border border-slate-100 rounded-full text-xs font-mono font-bold text-slate-300 shadow-sm";
            sa.className = "relative min-h-[500px] flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/50";
            si.className = "status-icon-container mb-12 text-slate-200 scale-100";
            si.innerHTML = `
                <svg class="w-32 h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>`;
        }

        function openPinModal() {
            if (logs.length === 0) return;
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('inputPin').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('inputPin').value = "";
        }

        function verifyAndExport() {
            const pin = document.getElementById('inputPin').value;
            if (pin === MASTER_PIN) {
                closePinModal();
                let csv = "\uFEFFGiờ,Họ Tên,Mã Số,UID,Phân Loại\n";
                [...logs].reverse().forEach(l => {
                    csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}",${l.type}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `Bao_Cao_Diem_Danh_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            } else {
                document.getElementById('inputPin').value = "";
                // Hiệu ứng cảnh báo sai PIN
                const modal = document.querySelector('#pinModal .bg-white');
                modal.classList.add('shake');
                setTimeout(() => modal.classList.remove('shake'), 600);
            }
        }
    </script>
</body>
</html>
