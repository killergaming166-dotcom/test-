<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Scanner - Anti-Freeze Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); padding: 2.5rem; width: 100%; max-width: 500px; position: relative; }
        
        #pinModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); z-index: 100; align-items: center; justify-content: center; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .cooldown-overlay {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            border-radius: 40px;
            z-index: 50;
        }

        .status-icon-container { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="p-4">

    <!-- Modal PIN -->
    <div id="pinModal">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl w-full max-w-xs text-center border border-slate-100">
            <h3 class="text-xl font-black mb-6 text-slate-800 uppercase">Mã PIN Quản Trị</h3>
            <input type="password" id="inputPin" class="w-full text-center text-3xl font-black border-b-2 border-slate-200 focus:border-indigo-500 outline-none mb-8 pb-2" placeholder="••••" maxlength="4">
            <div class="flex gap-3">
                <button onclick="closePinModal()" class="flex-1 py-3 text-slate-400 font-bold uppercase text-xs">Đóng</button>
                <button onclick="verifyAndExport()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs">XÁC NHẬN</button>
            </div>
        </div>
    </div>

    <div class="card space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">RFID SYSTEM</h1>
                <div class="flex items-center mt-1">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping mr-2"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đang kết nối...</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Lượt Quét</p>
                <p id="totalCount" class="text-3xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <!-- Main Scan Area -->
        <div id="scanArea" class="relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/30 transition-all duration-300">
            
            <!-- Cooldown Overlay -->
            <div id="cooldownLayer" class="cooldown-overlay absolute inset-0 flex flex-col items-center justify-center text-center">
                <div id="cooldownTimer" class="text-9xl font-black text-slate-800 tabular-nums">8</div>
                <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-[10px] mt-4">Hệ thống đang nghỉ...</p>
                <button onclick="resetScanner()" class="mt-8 text-[9px] font-black text-indigo-500 border border-indigo-100 px-4 py-2 rounded-full hover:bg-indigo-50">BỎ QUA NGHỈ</button>
            </div>

            <!-- Progress Ring -->
            <div id="progressContainer" class="absolute hidden">
                <svg width="240" height="240">
                    <circle class="progress-ring__circle" stroke="#6366f1" stroke-width="6" fill="transparent" r="110" cx="120" cy="120" stroke-dasharray="691.15" stroke-dashoffset="691.15"/>
                </svg>
            </div>

            <!-- Icon -->
            <div id="statusIcon" class="status-icon-container mb-8 text-slate-200">
                <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>
            </div>
            
            <div class="text-center px-4">
                <h2 id="displayName" class="text-3xl font-black text-slate-300 uppercase tracking-tight">Sẵn sàng</h2>
                <p id="displayMSSV" class="text-lg font-bold text-slate-400 mt-1 h-6"></p>
            </div>

            <div id="displayUID" class="absolute bottom-10 px-6 py-2 bg-white border border-slate-100 rounded-full text-[10px] font-mono font-bold text-slate-300">
                QUÉT THẺ ĐỂ BẮT ĐẦU
            </div>

            <div id="holdLabel" class="absolute bottom-4 text-[9px] font-black text-indigo-400 uppercase tracking-widest opacity-0 transition-opacity">
                Giữ thẻ 2 giây
            </div>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-4 pt-2">
            <button onclick="openPinModal()" class="py-4 bg-indigo-600 text-white rounded-2xl font-black text-[10px] tracking-widest shadow-lg shadow-indigo-100 uppercase transition-transform active:scale-95">
                XUẤT BÁO CÁO (CSV)
            </button>
            <button onclick="location.reload()" class="bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-[10px] tracking-widest uppercase hover:bg-slate-200">
                LÀM MỚI APP
            </button>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const MASTER_PIN = "0909";
        const HOLD_TIME = 2000; 
        const COOLDOWN_TIME = 8000;
        
        const eraWidget = new EraWidget();
        let logs = [];
        let configUID, configName, configMSSV;
        
        let isProcessing = false; // Đang cooldown
        let isHolding = false;    // Đang giữ thẻ
        let lastScannedUID = null; // UID vừa quét xong (để chống lặp)
        
        let holdStartTime = 0;
        let holdTimer = null;
        let countdownInterval = null;

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (c) => {
                configUID = c.realtime_configs[0];
                configName = c.realtime_configs[1];
                configMSSV = c.realtime_configs[2];
            },
            onValues: (v) => {
                const uid = v[configUID?.id]?.value;
                const name = v[configName?.id]?.value || "NGUOI LA";
                const mssv = v[configMSSV?.id]?.value || "---";

                // Điều kiện thẻ hợp lệ (Không trống, không phải 0)
                const hasCard = (uid && uid !== "0" && uid !== "---" && uid !== "None" && uid !== "Sẵn sàng");

                // NẾU ĐANG TRONG THỜI GIAN NGHỈ (8s): Bỏ qua mọi thao tác
                if (isProcessing) return;

                if (hasCard) {
                    // Chống lặp: Nếu thẻ này vừa quét xong và chưa nhấc ra, không quét tiếp
                    if (uid === lastScannedUID) return;

                    if (!isHolding) {
                        startHolding(uid, name, mssv);
                    }
                } else {
                    // Thẻ đã được nhấc ra khỏi đầu đọc
                    lastScannedUID = null; 
                    if (isHolding) cancelHolding();
                }
            }
        });

        function startHolding(uid, name, mssv) {
            isHolding = true;
            holdStartTime = Date.now();
            
            document.getElementById('holdLabel').classList.remove('opacity-0');
            document.getElementById('progressContainer').classList.remove('hidden');
            
            if (holdTimer) clearInterval(holdTimer);
            holdTimer = setInterval(() => {
                const elapsed = Date.now() - holdStartTime;
                const progress = Math.min(elapsed / HOLD_TIME, 1);
                circle.style.strokeDashoffset = circumference - (progress * circumference);

                if (elapsed >= HOLD_TIME) {
                    clearInterval(holdTimer);
                    executeScan(uid, name, mssv);
                }
            }, 50);
        }

        function cancelHolding() {
            isHolding = false;
            clearInterval(holdTimer);
            document.getElementById('holdLabel').classList.add('opacity-0');
            document.getElementById('progressContainer').classList.add('hidden');
            circle.style.strokeDashoffset = circumference;
        }

        function executeScan(uid, name, mssv) {
            isProcessing = true; // Bắt đầu trạng thái khóa hệ thống (8s)
            isHolding = false;
            lastScannedUID = uid; // Ghi nhớ thẻ này để không quét lại ngay

            const isStranger = (name.toUpperCase().includes("NGUOI LA") || mssv === "---");
            const timeStr = new Date().toLocaleTimeString('vi-VN', { hour12: false });
            
            logs.unshift({ time: timeStr, name, mssv, uid, type: isStranger ? 'NGƯỜI LẠ' : 'SINH VIÊN' });
            document.getElementById('totalCount').innerText = logs.length;

            updateUI(uid, name, mssv, isStranger);
            startCooldown();
        }

        function updateUI(uid, name, mssv, isError) {
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = name.toUpperCase();
            dm.innerText = mssv;
            du.innerText = `ID: ${uid}`;

            if (isError) {
                dn.className = "text-3xl font-black text-red-600 uppercase tracking-tight shake";
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-red-500 rounded-[48px] bg-red-50/50 shake";
                si.className = "status-icon-container mb-8 text-red-600 scale-110";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            } else {
                dn.className = "text-3xl font-black text-emerald-600 uppercase tracking-tight";
                sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-solid border-emerald-500 rounded-[48px] bg-emerald-50/50";
                si.className = "status-icon-container mb-8 text-emerald-600 scale-110";
                si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
            }
        }

        function startCooldown() {
            const overlay = document.getElementById('cooldownLayer');
            const timerText = document.getElementById('cooldownTimer');
            overlay.style.display = 'flex';
            
            let timeLeft = 8;
            timerText.innerText = timeLeft;

            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    resetScanner();
                }
            }, 1000);
        }

        function resetScanner() {
            isProcessing = false;
            clearInterval(countdownInterval);
            document.getElementById('cooldownLayer').style.display = 'none';
            document.getElementById('progressContainer').classList.add('hidden');
            
            const dn = document.getElementById('displayName');
            const dm = document.getElementById('displayMSSV');
            const du = document.getElementById('displayUID');
            const sa = document.getElementById('scanArea');
            const si = document.getElementById('statusIcon');

            dn.innerText = "Sẵn sàng";
            dn.className = "text-3xl font-black text-slate-300 uppercase tracking-tight";
            dm.innerText = "";
            du.innerText = "QUÉT THẺ ĐỂ BẮT ĐẦU";
            sa.className = "relative aspect-square flex flex-col items-center justify-center border-4 border-dashed border-slate-100 rounded-[48px] bg-slate-50/30";
            si.className = "status-icon-container mb-8 text-slate-200 scale-100";
            si.innerHTML = `<svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>`;
        }

        function openPinModal() {
            if (logs.length === 0) return;
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('inputPin').focus();
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('inputPin').value = "";
        }

        function verifyAndExport() {
            const pin = document.getElementById('inputPin').value;
            if (pin === MASTER_PIN) {
                closePinModal();
                let csv = "\uFEFFGiờ,Họ Tên,Mã Số,UID,Phân Loại\n";
                [...logs].reverse().forEach(l => {
                    csv += `${l.time},"${l.name}","${l.mssv}","'${l.uid}",${l.type}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `RFID_Log_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            } else {
                document.getElementById('inputPin').value = "";
                document.querySelector('#pinModal .bg-white').classList.add('shake');
                setTimeout(() => document.querySelector('#pinModal .bg-white').classList.remove('shake'), 500);
            }
        }
    </script>
</body>
</html>
