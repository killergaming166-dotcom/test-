<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Điểm Danh RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .scan-active { border-color: #10b981; background-color: #f0fdf4; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .scan-idle { border-color: #e2e8f0; background-color: #ffffff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        <!-- Header Info -->
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">RFID Check-in</h1>
                <p class="text-sm text-slate-500 font-medium">Hệ thống điểm danh sinh viên</p>
            </div>
            <div class="text-right">
                <span id="connectionStatus" class="status-dot bg-emerald-500"></span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kết nối Era</span>
            </div>
        </div>

        <!-- Main Display Card -->
        <div id="scanCard" class="glass-card rounded-[40px] shadow-2xl p-8 border-4 transition-all duration-300 scan-idle">
            <div class="text-center space-y-6">
                <div id="iconPlaceholder" class="flex justify-center text-slate-200">
                    <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                    </svg>
                </div>

                <div class="space-y-2">
                    <h2 id="studentName" class="text-2xl font-black text-slate-400 uppercase tracking-tight">Sẵn sàng quét thẻ</h2>
                    <p id="studentID" class="text-lg font-bold text-slate-300 min-h-[28px]">---</p>
                </div>

                <div class="pt-4">
                    <div class="inline-block px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-mono font-bold text-slate-400 tracking-wider">
                        UID: <span id="cardUID">---</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats & Actions -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tổng lượt quét</p>
                <p id="totalScans" class="text-3xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex items-center justify-center">
                <button onclick="downloadLogs()" class="w-full h-full flex flex-col items-center justify-center group">
                    <svg class="w-6 h-6 text-indigo-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <span class="text-[9px] font-bold text-slate-400 uppercase mt-1">Xuất dữ liệu</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Era Widget Library -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configUID, configName, configMSSV;
        let logs = [];
        let resetTimer = null;

        eraWidget.init({
            needRealtimeConfigs: true,
            onConfiguration: (configuration) => {
                // Thứ tự: Pin 1 = UID, Pin 2 = Name, Pin 3 = MSSV
                configUID = configuration.realtime_configs[0];
                configName = configuration.realtime_configs[1];
                configMSSV = configuration.realtime_configs[2];
            },
            onValues: (values) => {
                const uid = values[configUID?.id]?.value;
                const name = values[configName?.id]?.value;
                const mssv = values[configMSSV?.id]?.value;

                // Kiểm tra xem có giá trị hợp lệ không (loại bỏ các giá trị mặc định của chip)
                if (uid && uid !== "0" && uid !== "None" && uid !== "" && uid !== "Sẵn sàng") {
                    handleScan(uid, name, mssv);
                }
            }
        });

        function handleScan(uid, name, mssv) {
            // Cập nhật giao diện
            const nameEl = document.getElementById('studentName');
            const idEl = document.getElementById('studentID');
            const uidEl = document.getElementById('cardUID');
            const card = document.getElementById('scanCard');
            const icon = document.getElementById('iconPlaceholder');

            nameEl.innerText = name || "NGƯỜI LẠ";
            nameEl.classList.remove('text-slate-400');
            nameEl.classList.add('text-indigo-600');
            
            idEl.innerText = mssv || "Thẻ chưa đăng ký";
            uidEl.innerText = uid;
            
            card.className = "glass-card rounded-[40px] shadow-2xl p-8 border-4 transition-all duration-300 scan-active scale-[1.02]";
            icon.innerHTML = `<svg class="w-24 h-24 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            // Lưu log
            const now = new Date();
            logs.unshift({
                time: now.toLocaleTimeString('vi-VN'),
                date: now.toLocaleDateString('vi-VN'),
                name: name || "Unknown",
                mssv: mssv || "N/A",
                uid: uid
            });
            document.getElementById('totalScans').innerText = logs.length;

            // Tự động reset giao diện sau 4 giây
            if (resetTimer) clearTimeout(resetTimer);
            resetTimer = setTimeout(() => {
                nameEl.innerText = "Sẵn sàng quét thẻ";
                nameEl.classList.add('text-slate-400');
                nameEl.classList.remove('text-indigo-600');
                idEl.innerText = "---";
                uidEl.innerText = "---";
                card.className = "glass-card rounded-[40px] shadow-2xl p-8 border-4 transition-all duration-300 scan-idle";
                icon.innerHTML = `<svg class="w-24 h-24 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>`;
            }, 4000);
        }

        function downloadLogs() {
            if (logs.length === 0) return;
            let csvContent = "\uFEFFNgày,Giờ,Họ Tên,MSSV,UID\n";
            logs.forEach(row => {
                csvContent += `${row.date},${row.time},"${row.name}","${row.mssv}","'${row.uid}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `DiemDanh_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
