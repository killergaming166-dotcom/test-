<!DOCTYPE html>
<html lang="en" class="light-style layout-menu-fixed layout-compact" dir="ltr" data-theme="theme-default">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>E-Ra RFID Check-in</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Core CSS -->
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/fonts/boxicons.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/core.css" />
  <link rel="stylesheet" href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template-free/assets/vendor/css/theme-default.css" />
  
  <style>
    body { 
      background-color: #f5f5f9; 
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .card { 
      border: none;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }
    .checkin-status {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .bg-active { background-color: #71dd37; box-shadow: 0 0 10px #71dd37; }
    .bg-waiting { background-color: #8592a3; }
    
    .student-info-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a1acb8;
      font-weight: 700;
    }
    .student-info-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: #566a7f;
    }
  </style>
</head>

<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <div class="layout-page">
        <div class="content-wrapper">
          <div class="container-xxl flex-grow-1 container-p-y">
            
            <div class="row">
              <!-- Cột trái: Thông tin sinh viên -->
              <div class="col-lg-8 mb-4">
                <div class="card h-100">
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="card-title text-primary m-0">THÔNG TIN ĐIỂM DANH</h4>
                        <div id="connectionStatus">
                            <span class="checkin-status bg-waiting" id="statusDot"></span>
                            <small class="ms-1 fw-bold" id="statusText">Đang kết nối...</small>
                        </div>
                    </div>

                    <div class="row g-4">
                        <!-- Tên sinh viên -->
                        <div class="col-md-6">
                            <div class="p-3 border rounded bg-light">
                                <p class="student-info-label mb-1">Họ và Tên</p>
                                <div class="student-info-value" id="studentName">Sẵn sàng quẹt thẻ</div>
                            </div>
                        </div>
                        <!-- MSSV -->
                        <div class="col-md-6">
                            <div class="p-3 border rounded bg-light">
                                <p class="student-info-label mb-1">Mã số sinh viên</p>
                                <div class="student-info-value" id="studentID">---</div>
                            </div>
                        </div>
                        <!-- UID Thẻ -->
                        <div class="col-12 text-center py-2">
                             <small class="text-muted">Chip UID: <span id="cardUID" class="font-monospace">---</span></small>
                        </div>
                    </div>

                    <div class="mt-4 p-4 border-dashed rounded text-center border-primary bg-label-primary">
                        <i class="bx bx-rfid bx-lg mb-2"></i>
                        <p class="m-0 fw-bold" id="instruction">VUI LÒNG ĐƯA THẺ LẠI GẦN MÁY ĐỌC</p>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Cột phải: Thống kê & Điều khiển -->
              <div class="col-lg-4 mb-4">
                <div class="card mb-4">
                  <div class="card-body">
                    <h5 class="card-title">Hành động</h5>
                    <p class="small text-muted">Điều khiển thiết bị từ xa qua Cloud.</p>
                    <div class="d-grid gap-2">
                        <button id="btnReset" class="btn btn-outline-danger">
                            <i class="bx bx-reset me-1"></i> Reset Màn Hình
                        </button>
                        <button id="btnUnlock" class="btn btn-primary">
                            <i class="bx bx-lock-open-alt me-1"></i> Mở Cửa (Tạm thời)
                        </button>
                    </div>
                  </div>
                </div>

                <div class="card">
                    <div class="card-body">
                      <div class="d-flex align-items-center mb-3">
                        <div class="avatar flex-shrink-0 me-3">
                          <span class="avatar-initial rounded bg-label-info"><i class="bx bx-history"></i></span>
                        </div>
                        <h5 class="card-title m-0">Trạng thái hệ thống</h5>
                      </div>
                      <ul class="p-0 m-0">
                        <li class="d-flex mb-3 pb-1 border-bottom">
                          <div class="d-flex w-100 flex-wrap align-items-center justify-content-between gap-2">
                            <div class="me-2">
                              <h6 class="mb-0">Internet</h6>
                            </div>
                            <div class="user-progress"><span class="badge bg-label-success">Ổn định</span></div>
                          </div>
                        </li>
                        <li class="d-flex">
                            <div class="d-flex w-100 flex-wrap align-items-center justify-content-between gap-2">
                              <div class="me-2">
                                <h6 class="mb-0">RFID Reader</h6>
                              </div>
                              <div class="user-progress"><span class="badge bg-label-primary">Sẵn sàng</span></div>
                            </div>
                          </li>
                      </ul>
                    </div>
                  </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
  <script>
    // Khai báo các phần tử giao diện
    const studentNameDisplay = document.getElementById('studentName');
    const studentIDDisplay = document.getElementById('studentID');
    const cardUIDDisplay = document.getElementById('cardUID');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const instruction = document.getElementById('instruction');

    const btnReset = document.getElementById('btnReset');
    const btnUnlock = document.getElementById('btnUnlock');

    let configs = { uid: null, name: null, mssv: null };
    let actions = [];

    const eraWidget = new EraWidget();
    eraWidget.init({
      needRealtimeConfigs: true,
      needActions: true,
      maxRealtimeConfigsCount: 3,
      maxActionsCount: 2,

      onConfiguration: (configuration) => {
        // Thứ tự ưu tiên Pin khi bạn cài đặt trên Dashboard E-Ra
        configs.uid = configuration.realtime_configs[0] || null;  // Pin 1: UID Thẻ
        configs.name = configuration.realtime_configs[1] || null; // Pin 2: Tên SV
        configs.mssv = configuration.realtime_configs[2] || null; // Pin 3: MSSV
        actions = configuration.actions || [];
      },

      onValues: (values) => {
        // Cập nhật trạng thái Online
        statusDot.className = "checkin-status bg-active";
        statusText.innerText = "Cloud Online";

        // 1. Cập nhật UID
        if (configs.uid && values[configs.uid.id]) {
          cardUIDDisplay.innerHTML = values[configs.uid.id].value;
        }

        // 2. Cập nhật Tên Sinh Viên
        if (configs.name && values[configs.name.id]) {
          const nameValue = values[configs.name.id].value;
          studentNameDisplay.innerHTML = nameValue;
          
          if(nameValue !== "---" && nameValue !== "Sẵn sàng") {
              instruction.innerText = "ĐIỂM DANH THÀNH CÔNG!";
              instruction.parentElement.className = "mt-4 p-4 border-dashed rounded text-center border-success bg-label-success";
          } else {
              instruction.innerText = "VUI LÒNG ĐƯA THẺ LẠI GẦN MÁY ĐỌC";
              instruction.parentElement.className = "mt-4 p-4 border-dashed rounded text-center border-primary bg-label-primary";
          }
        }

        // 3. Cập nhật MSSV
        if (configs.mssv && values[configs.mssv.id]) {
          studentIDDisplay.innerHTML = values[configs.mssv.id].value;
        }
      },
    });

    // Sự kiện điều khiển (Actions)
    btnReset.addEventListener('click', () => {
      if (actions[0]) {
          eraWidget.triggerAction(actions[0].action, null);
          alert("Đã gửi lệnh Reset hệ thống!");
      }
    });

    btnUnlock.addEventListener('click', () => {
      if (actions[1]) {
          eraWidget.triggerAction(actions[1].action, null);
          alert("Đã gửi lệnh mở cửa!");
      }
    });
  </script>
</body>
</html>
